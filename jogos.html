<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./Assets/Home/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogos</title>
    <style>
      /* ========================================
           VARIÁVEIS CSS
           ======================================== */
      :root {
        --primary-gradient: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        --primary-color: #bb86fc;
        --secondary-color: #03dac6;
        --accent-color: #cf6679;
        --text-primary: #e1e1e1;
        --text-secondary: #b3b3b3;
        --bg-main: rgba(18, 18, 35, 0.98);
        --bg-nav: rgba(18, 18, 35, 0.98);
        --shadow-color: rgba(0, 0, 0, 0.4);
        --shadow-color-strong: rgba(0, 0, 0, 0.6);
        --transition-speed: 0.8s;
      }

      /* ========================================
           RESET E ESTILOS BASE
           ======================================== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: radial-gradient(
          ellipse at center,
          #0a0a0a 0%,
          #000000 100%
        );
        min-height: 100vh;
        color: var(--text-primary);
        overflow-x: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
      }

      /* ========================================
           ANIMAÇÃO DE FUNDO - CAMPO DE ESTRELAS
           ======================================== */
      .starfield {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: -1;
        opacity: 1;
        overflow: hidden;
      }

      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0;
        animation: star-travel linear infinite;
      }

      .star.distant {
        width: 1px;
        height: 1px;
        animation-duration: 25s;
        box-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
      }

      .star.medium {
        width: 1.5px;
        height: 1.5px;
        animation-duration: 15s;
        box-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
      }

      .star.close {
        width: 2px;
        height: 2px;
        animation-duration: 8s;
        box-shadow: 0 0 4px rgba(255, 255, 255, 0.7);
      }

      .star.blue {
        background: #e6f3ff;
        box-shadow: 0 0 6px rgba(173, 216, 255, 0.6);
      }

      .star.yellow {
        background: #fff8e1;
        box-shadow: 0 0 4px rgba(255, 248, 225, 0.5);
      }

      @keyframes star-travel {
        0% {
          opacity: 0;
          transform: translate(0, 0) scale(0.5);
        }

        10% {
          opacity: 0.3;
        }

        50% {
          opacity: 1;
          transform: translate(var(--dx), var(--dy)) scale(1);
        }

        90% {
          opacity: 0.8;
        }

        100% {
          opacity: 0;
          transform: translate(calc(var(--dx) * 2), calc(var(--dy) * 2))
            scale(1.5);
        }
      }

      @keyframes twinkle {
        0% {
          opacity: 0.3;
        }

        100% {
          opacity: 0.8;
        }
      }

      /* ========================================
           NAVEGAÇÃO
           ======================================== */
      .navigation {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: var(--bg-nav);
        backdrop-filter: blur(10px);
        border-bottom: 2px solid var(--primary-color);
        z-index: 1000;
        padding: 15px 0;
        box-shadow: 0 2px 20px var(--shadow-color-strong);
      }

      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
      }

      .nav-home {
        font-size: 1.5em;
        font-weight: bold;
        color: var(--text-primary);
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .nav-home:hover {
        color: var(--primary-color);
        transform: scale(1.05);
      }

      .nav-links {
        display: flex;
        gap: 25px;
        list-style: none;
      }

      .nav-links a {
        color: var(--text-primary);
        text-decoration: none;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: 25px;
        transition: all 0.3s ease;
        position: relative;
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: white;
        background: linear-gradient(
          45deg,
          var(--primary-color),
          var(--secondary-color)
        );
        transform: translateY(-2px);
        box-shadow: 0 5px 15px var(--shadow-color);
      }

      @media (max-width: 768px) {
        .nav-links {
          display: none;
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: var(--bg-nav);
          flex-direction: column;
          padding: 20px;
          box-shadow: 0 5px 20px var(--shadow-color-strong);
          border-radius: 0 0 15px 15px;
          gap: 15px;
        }

        .nav-links.active {
          display: flex;
        }

        .menu-toggle {
          display: block;
        }

        .main-container {
          margin-top: 80px;
          padding: 0 10px;
        }

        .unified-header {
          min-height: 480px;
          padding: 40px 20px 20px 20px !important;
          margin-top: 0;
          margin-bottom: 20px;
        }

        .unified-header h1 {
          font-size: 2.2em;
        }

        .unified-header p {
          font-size: 1.1em;
        }

        .filters-stats-flex {
          flex-direction: column;
          gap: 20px;
          align-items: stretch;
        }

        .filters,
        .stats-compact {
          width: 100%;
          min-width: unset;
          padding: 12px !important;
        }

        .stats-compact h3 {
          font-size: 1em !important;
          margin-bottom: 8px !important;
        }

        .stat-value {
          font-size: 1.1em;
        }

        .stat-label {
          font-size: 0.8em;
        }

        .breadcrumb {
          font-size: 0.9em;
          margin-bottom: 10px;
        }
      }

      @media (max-width: 480px) {
        .nav-container {
          padding: 0 15px;
        }

        .unified-header {
          min-height: 420px;
          padding: 30px 15px 15px 15px !important;
        }

        .unified-header h1 {
          font-size: 1.8em;
        }

        .unified-header p {
          font-size: 1em;
        }

        .games-grid {
          display: flex;
          flex-direction: column;
          gap: 24px;
          padding: 0 15px;
        }

        .game-card {
          margin: 0;
          border-radius: 12px;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .modal-content {
          width: 100vw;
          height: 100vh;
          height: 100dvh;
          max-width: 100%;
          max-height: 100%;
          margin: 0;
          border-radius: 0;
          top: 0;
          transform: none;
          display: flex;
          flex-direction: column;
        }

        .modal-poster {
          display: none;
        }

        .modal-backdrop.mobile-only {
          display: block !important;
          object-fit: cover;
          opacity: 1 !important;
          filter: brightness(0.4);
          background-color: #000;
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 0;
        }

        .modal-info {
          display: flex;
          flex-direction: column;
          gap: 20px;
          padding-bottom: 40px;
        }

        .modal-header-title {
          order: 1;
        }

        .modal-plot-section {
          order: 2;
          margin-top: 0;
          padding-top: 0;
          border-top: none;
        }

        .modal-actions {
          order: 3;
          margin-top: 10px;
          padding-top: 0;
          border-top: none;
        }

        .info-grid {
          order: 4;
          margin-top: 20px;
          border-top: 1px solid rgba(255, 255, 255, 0.1);
          padding-top: 20px;
        }

        .modal-title {
          font-size: 1.8rem;
          text-align: left;
          margin-bottom: 10px;
        }

        .modal-body {
          padding: 0 20px 20px;
          height: auto;
          flex: 1;
          overflow-y: auto;
          z-index: 2;
        }

        .modal-header {
          padding: 15px 15px 0;
          justify-content: flex-end;
          flex-shrink: 0;
          z-index: 3;
        }

        .close {
          font-size: 24px;
          width: 40px;
          height: 40px;
        }

        .info-grid {
          display: flex;
          flex-direction: column;
          gap: 12px;
        }

        .info-item {
          flex-direction: row;
          align-items: center;
          gap: 10px;
          font-size: 0.9rem;
          display: flex;
        }

        .info-item.full-width {
          grid-column: auto;
        }

        .info-item strong {
          min-width: 140px;
          color: var(--primary-color);
          flex-shrink: 0;
        }

        .modal-actions {
          display: flex;
          flex-direction: row;
          gap: 10px;
        }

        .modal-actions a,
        .modal-actions button {
          flex: 1;
          justify-content: center;
          padding: 12px 10px;
          font-size: 0.9rem;
          text-align: center;
        }
      }

      .menu-toggle {
        display: none;
        background: none;
        border: none;
        font-size: 1.5em;
        cursor: pointer;
        color: var(--text-primary);
      }

      /* ========================================
           LAYOUT PRINCIPAL
           ======================================== */
      .main-container {
        max-width: 1400px;
        margin: 100px auto 0 auto;
        padding: 0 20px;
      }

      /* Header Unificado */
      .header {
        text-align: center;
        margin-bottom: 40px;
        background: var(--bg-main);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 30px var(--shadow-color-strong);
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
      }

      .header::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--secondary-color)
        );
      }

      .header h1 {
        color: #111 !important;
        font-size: 3em;
        margin-bottom: 15px;
        text-shadow:
          0 0 20px var(--primary-color),
          2px 2px 4px var(--shadow-color);
      }

      .header p {
        color: #111 !important;
        font-size: 1.2em;
        margin-bottom: 30px;
        text-shadow:
          0 0 10px var(--primary-color),
          1px 1px 2px var(--shadow-color);
      }

      /* ========================================
           FILTROS E CONTROLES
           ======================================== */
      .filters {
        flex: 2;
        min-width: 320px;
        border-radius: 18px !important;

        padding: 10px 10px 8px 10px !important;
        box-shadow: 0 2px 6px var(--shadow-color-strong);
        margin-bottom: 0;
        background: rgba(18, 18, 35, 0.6);
      }

      .filter-row {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        align-items: flex-end;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 120px;
      }

      .filter-group label {
        font-weight: 600;
        color: var(--text-primary);
        font-size: 0.9em;
        text-align: left;
      }

      .filter-group select,
      .filter-group input {
        padding: 10px;
        border: 2px solid rgba(187, 134, 252, 0.3);
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s ease;
        background: rgba(18, 18, 35, 0.8);
        color: var(--text-primary);
      }

      .filter-group select:focus,
      .filter-group input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(187, 134, 252, 0.1);
      }

      .filter-tags {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .filter-tag {
        background: linear-gradient(
          45deg,
          var(--primary-color),
          var(--secondary-color)
        );
        color: white;
        padding: 8px 16px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-size: 0.9em;
        font-weight: 500;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .filter-tag:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px var(--shadow-color);
      }

      .filter-tag.active {
        background: linear-gradient(
          45deg,
          var(--accent-color),
          var(--primary-color)
        );
        box-shadow: 0 5px 15px rgba(207, 102, 121, 0.4);
      }

      /* ========================================
           ESTADOS DE CARREGAMENTO
           ======================================== */
      .loading {
        text-align: center;
        padding: 60px;
        color: var(--text-secondary);
        font-size: 1.2em;
      }

      .loading-spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(187, 134, 252, 0.2);
        border-top: 4px solid var(--primary-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      /* ========================================
           GRID DE JOGOS
           ======================================== */
      .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      /* Separadores de Página */
      .page-separator {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin: 40px 0;
        padding: 20px 0;
      }

      .separator-line {
        flex: 1;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--primary-color) 20%,
          var(--secondary-color) 50%,
          var(--primary-color) 80%,
          transparent 100%
        );
        border-radius: 1px;
        opacity: 0.7;
      }

      .separator-text {
        background: var(--bg-main);
        color: var(--text-primary);
        padding: 10px 20px;
        border-radius: 25px;
        font-weight: bold;
        font-size: 1.1em;
        box-shadow: 0 5px 15px var(--shadow-color);
        border: 2px solid var(--primary-color);
        backdrop-filter: blur(10px);
        white-space: nowrap;
        animation: separator-pulse 3s ease-in-out infinite;
      }

      @keyframes separator-pulse {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 5px 15px var(--shadow-color);
        }

        50% {
          transform: scale(1.05);
          box-shadow: 0 8px 25px var(--shadow-color-strong);
        }
      }

      /* ========================================
           PAGINAÇÃO
           ======================================== */
      .pagination-container {
        grid-column: 1 / -1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        margin: 40px 0;
        padding: 30px 0;
        background: var(--bg-main);
        border-radius: 20px;
        box-shadow: 0 10px 30px var(--shadow-color-strong);
        backdrop-filter: blur(10px);
      }

      .pagination-info {
        color: var(--text-secondary);
        font-size: 1.1em;
        font-weight: 500;
      }

      .pagination-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .pagination-btn {
        background: var(--bg-main);
        color: var(--text-primary);
        border: 2px solid var(--primary-color);
        padding: 12px 18px;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1em;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
        min-width: 45px;
        text-align: center;
      }

      .pagination-btn:hover {
        background: linear-gradient(
          45deg,
          var(--primary-color),
          var(--secondary-color)
        );
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px var(--shadow-color);
      }

      .pagination-btn.active {
        background: linear-gradient(
          45deg,
          var(--primary-color),
          var(--secondary-color)
        );
        color: white;
        box-shadow: 0 5px 15px var(--shadow-color);
      }

      .pagination-btn.prev-btn,
      .pagination-btn.next-btn {
        background: linear-gradient(
          45deg,
          var(--accent-color),
          var(--primary-color)
        );
        color: white;
        min-width: 100px;
      }

      .pagination-btn.prev-btn:hover,
      .pagination-btn.next-btn:hover {
        background: linear-gradient(
          45deg,
          var(--primary-color),
          var(--accent-color)
        );
        transform: translateY(-2px);
        box-shadow: 0 8px 20px var(--shadow-color);
      }

      .pagination-dots {
        color: var(--text-secondary);
        font-weight: bold;
        font-size: 1.2em;
        padding: 0 10px;
      }

      .game-card {
        background: var(--bg-main);
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px var(--shadow-color-strong);
        transition: all 0.3s ease;
        cursor: pointer;
        position: relative;
        backdrop-filter: blur(10px);
      }

      .game-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px var(--shadow-color-strong);
      }

      .game-poster {
        width: 100%;
        height: 280px;
        object-fit: cover;
        background: linear-gradient(
          45deg,
          rgba(18, 18, 35, 0.8),
          rgba(22, 33, 62, 0.8)
        );
        background-size: cover;
        background-position: center;
        position: relative;
      }

      .game-poster.loading {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        font-size: 3em;
      }

      .game-info {
        padding: 10px;
      }

      .game-title {
        font-size: 1em;
        font-weight: bold;
        color: var(--text-primary);
        margin-bottom: 6px;
        line-height: 1.2;
      }

      .game-meta {
        display: flex;
        gap: 15px;
        margin-bottom: 8px;
        font-size: 0.9em;
        color: var(--text-secondary);
      }

      .game-meta span {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .game-genres {
        display: flex;
        gap: 2px;
        margin-bottom: 8px;
        flex-wrap: nowrap;
        white-space: nowrap;
        overflow-x: auto;
        scrollbar-width: thin;
      }

      .genre-tag {
        background: linear-gradient(
          45deg,
          var(--primary-color),
          var(--secondary-color)
        );
        color: white;
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 0.75em;
        font-weight: 500;
        margin-right: 2px;
        margin-bottom: 2px;
      }

      .game-rating {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .rating-stars {
        display: flex;
        gap: 2px;
      }

      .star {
        color: #ffd700;
        font-size: 1.1em;
      }

      .star.empty {
        color: rgba(255, 255, 255, 0.3);
      }

      .game-plot {
        color: var(--text-secondary);
        font-size: 0.9em;
        line-height: 1.3;
        max-height: 22px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ========================================
           MODAL DE DETALHES DO JOGO
           ======================================== */
      /* Container Principal do Modal */
      .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(5px);
      }

      .modal-content {
        background: transparent;
        margin: 0;
        padding: 0;
        border-radius: 24px;
        width: 95vw;
        height: 95vh;
        max-width: none;
        max-height: none;
        overflow: hidden;
        position: absolute;

        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 30px 60px var(--shadow-color-strong);
      }

      /* Backdrop (Imagem de Fundo) */
      .modal-backdrop {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      .modal-backdrop.mobile-only {
        display: none;
      }

      /* Overlay de Gradiente para Legibilidade */
      .modal-content::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          135deg,
          rgba(0, 0, 0, 0.8) 0%,
          rgba(0, 0, 0, 0.3) 30%,
          rgba(0, 0, 0, 0.1) 50%,
          rgba(0, 0, 0, 0.4) 70%,
          rgba(0, 0, 0, 0.9) 100%
        );
        z-index: 1;
        border-radius: 24px;
      }

      /* Cabeçalho do Modal (Botão Fechar) */
      .modal-header {
        position: relative;
        z-index: 3;
        padding: 20px 30px 0;
        display: flex;
        justify-content: flex-end;
      }

      .close {
        color: white;
        font-size: 32px;
        font-weight: bold;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
        padding-bottom: 4px;

        line-height: 1;
      }

      .close:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
      }

      /* Corpo do Modal (Conteúdo Rolável) */
      .modal-body {
        position: relative;
        z-index: 2;
        padding: 0 30px 30px;
        height: calc(100vh - 140px);
        max-height: calc(96vh - 140px);
        overflow-y: auto;
      }

      /* Layout de Informações (Poster + Detalhes) */
      .modal-info {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 40px;
        align-items: start;
        min-height: 500px;
      }

      .info-grid {

    <script>
      // ========================================
      // VARIÁVEIS GLOBAIS E CONFIGURAÇÕES
      // ========================================
      // Variável global para quantidade de jogos por página
      const gamesPerPage = 24;

      // Auxiliares para extração de dados
      const getGameYear = (game) => {
        const details = gamesWithDetails.get(game.slug);
        if (details && details.year && details.year !== "N/A") {
          return parseInt(details.year, 10);
        }

        const yearMatch =
          game.title.match(/\((\d{4})\)$/) ||
          game.title.match(/(\d{4})$/) ||
          game.title.match(/\[(\d{4})\]/);
        if (yearMatch) {
          const year = parseInt(yearMatch[1], 10);
          if (year >= 1970 && year <= new Date().getFullYear() + 5) {
            return year;
          }
        }
        return 0;
      };

      // Função centralizada para ordenar e selecionar os jogos recentes
      function getSortedRecentGames() {
        return [...allGames]
          .sort((a, b) => getGameYear(b) - getGameYear(a))
          .slice(0, 24);
      }

      // Função debounce para reordenar e renderizar recentes dinamicamente
      function debouncedResortAndRender() {
        clearTimeout(resortDebounceTimer);
        resortDebounceTimer = setTimeout(() => {
          try {
            if (currentCategory === "recent") {
              displayedGames = getSortedRecentGames();
              renderGamesSmart(displayedGames);
            }
          } catch (error) {
            console.error(
              "Erro ao reordenar jogos recentes dinamicamente:",
              error,
            );
          }
        }, 500);
      }

      // Função para criar campo de estrelas
      function createStarfield() {
        const starfield = document.getElementById("starfield");
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        starfield.innerHTML = "";

        for (let i = 0; i < 200; i++) {
          const star = document.createElement("div");
          star.className = "star";

          const angle = Math.random() * 2 * Math.PI;
          const initialRadius = Math.random() * 50 + 10;
          const startX = centerX + Math.cos(angle) * initialRadius;
          const startY = centerY + Math.sin(angle) * initialRadius;

          const directionX = Math.cos(angle);
          const directionY = Math.sin(angle);

          const maxDistance = Math.sqrt(
            Math.pow(window.innerWidth, 2) + Math.pow(window.innerHeight, 2),
          );
          const travelDistance = maxDistance * (0.8 + Math.random() * 0.4);

          const starType = Math.random();
          if (starType < 0.6) {
            star.classList.add("distant");
          } else if (starType < 0.85) {
            star.classList.add("medium");
          } else {
            star.classList.add("close");
          }

          const colorType = Math.random();

      // ========================================

      // Criar HTML da paginação
      function createPaginationHTML(currentPage, totalPages, totalGames) {
        const startGame = (currentPage - 1) * gamesPerPage + 1;
        const endGame = Math.min(currentPage * gamesPerPage, totalGames);

        let paginationHTML = `
                <div class="pagination-container">
                    <div class="pagination-info">
                        <span>Mostrando ${startGame}-${endGame} de ${totalGames} jogos</span>
                    </div>
                    <div class="pagination-controls">
            `;

        if (currentPage > 1) {
          paginationHTML += `<button class="pagination-btn prev-btn" onclick="changePage(${currentPage - 1})">← Anterior</button>`;
        }

        const maxVisiblePages = 5;
        let startPage = Math.max(
          1,
          currentPage - Math.floor(maxVisiblePages / 2),
        );
        let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);

        if (endPage - startPage + 1 < maxVisiblePages) {
          startPage = Math.max(1, endPage - maxVisiblePages + 1);
        }

        if (startPage > 1) {
          paginationHTML += `<button class="pagination-btn" onclick="changePage(1)">1</button>`;
          if (startPage > 2) {
            paginationHTML += `<span class="pagination-dots">...</span>`;
          }
        }

        for (let i = startPage; i <= endPage; i++) {
          const isActive = i === currentPage;
          paginationHTML += `<button class="pagination-btn${isActive ? " active" : ""}" onclick="changePage(${i})">${i}</button>`;
        }

        if (endPage < totalPages) {
          if (endPage < totalPages - 1) {
            paginationHTML += `<span class="pagination-dots">...</span>`;
          }
          paginationHTML += `<button class="pagination-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
        }

        if (currentPage < totalPages) {
          paginationHTML += `<button class="pagination-btn next-btn" onclick="changePage(${currentPage + 1})">Próximo →</button>`;
        }

        paginationHTML += `
                    </div>
                </div>
            `;

        return paginationHTML;
      }

      // Carregar detalhes em background

          const batch = games.slice(i, i + BATCH_SIZE);

          batch.forEach((game) => {
            if (!gamesWithDetails.has(game.slug)) {
              gamesWithDetails.set(game.slug, game);

              updateGameCard(game.slug, game);

              debouncedResortAndRender();
            }
          });

          if (i + BATCH_SIZE < games.length) {
            setTimeout(() => {}, 10);
          }
        }

        updateStats();

      async function fetchGameDetailsIGDB(title) {

          const year = yearMatch ? yearMatch[1] : null;

      // Função helper para normalizar rating (IGDB usa 0-100, converter para 0-10)
      function normalizeRating(rating) {
        const numRating = parseFloat(rating) || 0;
        return Math.round((numRating / 10) * 10) / 10;
      }

      // Gerar estrelas para avaliação
      function generateStars(rating) {
        const fullStars = Math.floor(rating / 2);
        const halfStar = rating % 2 >= 1;
        const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);

        let stars = "";
        for (let i = 0; i < fullStars; i++)
          stars += '<span class="star">★</span>';
        if (halfStar) stars += '<span class="star">★</span>';
        for (let i = 0; i < emptyStars; i++)
          stars += '<span class="star empty">☆</span>';

        return stars;
      }

            category === "favorites"
              ? '[onclick*="favorites"]'
              : category === "all"
                ? '[onclick*="all"]'
                : category === "recent"

      // Buscar jogos
      function searchGames() {
        const searchTerm = document
          .getElementById("searchInput")
          .value.toLowerCase();

        let baseList = allGames;
        if (searchTerm === "") {
          displayedGames = baseList;
          currentCategory = "all";
          renderGamesSmart(baseList);
          updateCurrentCount(baseList.length);
          return;
        }

        const filteredGames = baseList.filter((game) => {
          const details = gamesWithDetails.get(game.slug) || game;
          return (
            details.title.toLowerCase().includes(searchTerm) ||
            (details.developer &&
              details.developer.toLowerCase().includes(searchTerm)) ||
            (details.genre && details.genre.toLowerCase().includes(searchTerm))
          );
        });

        displayedGames = filteredGames;
        currentCategory = "search";
        renderGamesSmart(filteredGames);
        updateCurrentCount(filteredGames.length);
      }

      // Filtrar jogos por gênero, ano e nota
      function filterGames() {
        const genreFilter = document.getElementById("genreFilter").value;
        const yearFilter = document.getElementById("yearFilter").value;
        const ratingFilter = document.getElementById("ratingFilter").value;
        const searchTerm = document
          .getElementById("searchInput")
          .value.toLowerCase();

        let baseList = allGames;
        let filteredGames = baseList.filter((game) => {
          const details = gamesWithDetails.get(game.slug) || game;

          const matchesSearch =
            searchTerm === "" ||
            details.title.toLowerCase().includes(searchTerm) ||
            (details.developer &&
              details.developer.toLowerCase().includes(searchTerm)) ||
            (details.genre && details.genre.toLowerCase().includes(searchTerm));

          const matchesGenre =
            genreFilter === "" ||
            (details.genre &&
              details.genre.toLowerCase().includes(genreFilter.toLowerCase()));

          const matchesYear = yearFilter === "" || details.year === yearFilter;

          const gameRating = normalizeRating(details.rating);
          const matchesRating =
            ratingFilter === "" || gameRating >= parseFloat(ratingFilter);
          return matchesSearch && matchesGenre && matchesYear && matchesRating;
        });

        displayedGames = filteredGames;
        currentCategory = "filtered";
        renderGamesSmart(filteredGames);
        updateCurrentCount(filteredGames.length);
      }

      // Popular filtros
      async function populateFilters() {
        const genres = new Set();
        const years = new Set();

        allGames.forEach((game) => {
          const yearMatch = game.title?.match(/\((\d{4})\)/);
          if (yearMatch) years.add(yearMatch[1]);
          if (game.year && game.year !== "N/A") years.add(game.year);

          if (game.genre && game.genre !== "N/A") {
            game.genre.split(",").forEach((g) => genres.add(g.trim()));
          }
        });

        gamesWithDetails.forEach((details) => {
          if (details.genre && details.genre !== "N/A") {
            details.genre.split(",").forEach((g) => genres.add(g.trim()));
          }
          if (details.year && details.year !== "N/A") {
            years.add(details.year);
          }
        });

        const genreSelect = document.getElementById("genreFilter");
        const currentGenre = genreSelect.value;
        genreSelect.innerHTML = '<option value="">Gêneros</option>';
        [...genres].sort().forEach((genre) => {
          const option = document.createElement("option");
          option.value = genre;
          option.textContent = genre;
          genreSelect.appendChild(option);
        });
        genreSelect.value = currentGenre;

        const yearSelect = document.getElementById("yearFilter");
        const currentYear = yearSelect.value;
        yearSelect.innerHTML = '<option value="">Anos</option>';
        [...years]
          .sort((a, b) => b - a)
          .forEach((year) => {
            const option = document.createElement("option");
            option.value = year;
            option.textContent = year;
            yearSelect.appendChild(option);
          });
        yearSelect.value = currentYear;
      }

      // Atualizar estatísticas

        const totalGames = allGames.length;
        const currentGames = displayedGames.length;

        const genres = new Set();
        gamesWithDetails.forEach((details) => {
          if (details.genre && details.genre !== "N/A") {
            details.genre.split(",").forEach((g) => genres.add(g.trim()));
          }
        });

        let totalRating = 0;
        let ratedGames = 0;
        gamesWithDetails.forEach((details) => {
          const rating = normalizeRating(details.rating);
          if (!isNaN(rating) && rating > 0) {
            totalRating += rating;
            ratedGames++;
          }

        const avgRating =
          ratedGames > 0 ? (totalRating / ratedGames).toFixed(1) : 0;

        document.getElementById("totalGames").textContent = totalGames;
        document.getElementById("currentGames").textContent = currentGames;
        document.getElementById("genresCount").textContent = genres.size;
        document.getElementById("avgRating").textContent = avgRating;
      }

        }

        const separator = embedUrl.includes("?") ? "&" : "?";
        embedUrl += `${separator}autoplay=1&rel=0&modestbranding=1&showinfo=0`;

        video.src = embedUrl;
        modal.style.display = "block";
        document.body.style.overflow = "hidden";

        closeModal();
      }

      // Fechar modal de trailer
      function closeTrailerModal() {
        const modal = document.getElementById("trailerModal");
        const video = document.getElementById("trailerVideo");

        modal.style.display = "none";
        video.src = "";
        document.body.style.overflow = "auto";
      }

      // Fechar modal clicando fora
      window.onclick = function (event) {
        const gameModal = document.getElementById("gameModal");
        const trailerModal = document.getElementById("trailerModal");

        if (event.target === gameModal) {
          closeModal();
        }
        if (event.target === trailerModal) {
          closeTrailerModal();
        }
      };

      // Menu mobile toggle
      function toggleMenu() {
        const navLinks = document.getElementById("navLinks");
        navLinks.classList.toggle("active");
      }

      // Fechar menu ao clicar fora
      document.addEventListener("click", function (e) {
        const nav = document.querySelector(".navigation");
        const navLinks = document.getElementById("navLinks");
        if (!nav.contains(e.target)) {
          navLinks.classList.remove("active");
        }
      });

      // ========================================
      // EVENT LISTENERS E ATALHOS
      // ========================================
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          const trailerModal = document.getElementById("trailerModal");
          if (trailerModal.style.display === "block") {
            closeTrailerModal();
          } else {
            closeModal();
          }
        }
        if (e.key === "/" && !e.ctrlKey && !e.altKey) {
          e.preventDefault();
          document.getElementById("searchInput").focus();
        }
      });

      // Handle Back Button closing
      window.addEventListener("popstate", function (event) {
        const modal = document.getElementById("gameModal");
        if (modal.style.display === "block") {
          closeModal();
        }
      });

      // Lazy loading para quando carregar todos os jogos
      let isLoadingMore = false;

      window.addEventListener("scroll", function () {
        if (currentCategory === "all" && !isLoadingMore) {
          const scrollTop =
            window.pageYOffset || document.documentElement.scrollTop;
          const windowHeight = window.innerHeight;
          const documentHeight = document.documentElement.scrollHeight;

          if (scrollTop + windowHeight >= documentHeight - 1000) {
            loadMoreGames();
          }
        }
      });

      async function loadMoreGames() {
        if (isLoadingMore || displayedGames.length >= allGames.length) return;

        isLoadingMore = true;
        const currentLength = displayedGames.length;
        const nextBatch = allGames.slice(currentLength, currentLength + 20);

        if (nextBatch.length === 0) return;

        const grid = document.getElementById("gamesGrid");
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "loading";
        loadingDiv.innerHTML =
          '<div class="loading-spinner"></div><p>Carregando mais jogos...</p>';
        grid.appendChild(loadingDiv);

        displayedGames = displayedGames.concat(nextBatch);

        loadingDiv.remove();
        renderGamesSmart(displayedGames);

        loadGameDetailsBackground(nextBatch);

        isLoadingMore = false;
      }

      // Atualizar card individual
      function updateGameCard(slug, details) {
        const card = document.querySelector(`[data-slug="${slug}"]`);
        if (!card) return;

        const rating = parseFloat(details.rating) || 0;
        const stars = generateStars(rating);

        const poster = card.querySelector(".game-poster");
        if (details.cover) {
          poster.style.backgroundImage = `url(${details.cover})`;
          poster.classList.remove("loading");
          poster.textContent = "";
        }

        const meta = card.querySelector(".game-meta");
        meta.innerHTML = `
                <span>📅 ${details.year}</span>
                <span>🎮 ${details.developer}</span>
            `;

        const genres = card.querySelector(".game-genres");
        genres.innerHTML =
          details.genre !== "N/A"
            ? details.genre
                .split(",")
                .slice(0, 1)
                .map((g) => `<span class="genre-tag">${g.trim()}</span>`)
                .join("")
            : '<span class="genre-tag">Gênero não disponível</span>';

        const ratingDiv = card.querySelector(".game-rating");
        ratingDiv.innerHTML = `
                <div class="rating-stars">${stars}</div>
                <span>${normalizeRating(details.rating)}/10</span>
            `;

        const plot = card.querySelector(".game-plot");
        plot.textContent = details.summary;

        populateFilters();
      }

      // Aguarda até que todos os detalhes estejam carregados antes de popular os filtros
      async function waitForAllDetailsAndPopulateFilters() {
        while (gamesWithDetails.size !== allGames.length) {
          await new Promise((resolve) => setTimeout(resolve, 100));
        }
        populateFilters();
      }
    </script>
  </body>
</html>
