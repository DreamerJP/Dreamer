<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./Assets/Home/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=10"
    />
    <title>Galeria de Imagens</title>
    <style>
      :root {
        --primary-gradient: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        --primary-color: #bb86fc;
        --secondary-color: #03dac6;
        --accent-color: #cf6679;
        --text-primary: #e1e1e1;
        --text-secondary: #b3b3b3;
        --bg-main: rgba(18, 18, 35, 0.98);
        --bg-nav: rgba(18, 18, 35, 0.98);
        --shadow-color: rgba(0, 0, 0, 0.4);
        --shadow-color-strong: rgba(0, 0, 0, 0.6);
        --transition-speed: 0.3s;
        --border-radius: 15px;
        --main-gradient: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        --button-gradient: linear-gradient(
          45deg,
          var(--primary-color),
          var(--secondary-color)
        );
        --background-white: var(--bg-main);
        --dark-text: var(--text-primary);
        --light-text: var(--text-secondary);
        --secondary-text: var(--text-secondary);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(
          ellipse at center,
          #0a0a0a 0%,
          #000000 100%
        );
        min-height: 100vh;
        color: var(--text-primary);
        overflow-x: hidden;
        padding: 20px;
        overflow-y: scroll;
      }

      .starfield {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: -1;
        opacity: 0.8;
        overflow: hidden;
      }

      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0;
        animation: star-travel linear infinite;
      }

      .star.distant {
        width: 1px;
        height: 1px;
        animation-duration: 25s;
        box-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
      }

      .star.medium {
        width: 1.5px;
        height: 1.5px;
        animation-duration: 15s;
        box-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
      }

      .star.close {
        width: 2px;
        height: 2px;
        animation-duration: 8s;
        box-shadow: 0 0 4px rgba(255, 255, 255, 0.7);
      }

      .star.blue {
        background: #e6f3ff;
        box-shadow: 0 0 6px rgba(173, 216, 255, 0.6);
      }

      .star.yellow {
        background: #fff8e1;
        box-shadow: 0 0 4px rgba(255, 248, 225, 0.5);
      }

      @keyframes star-travel {
        0% {
          opacity: 0;
          transform: translate(0, 0) scale(0.5);
        }

        10% {
          opacity: 0.4;
        }

        50% {
          opacity: 1;
          transform: translate(var(--dx), var(--dy)) scale(1);
        }

        90% {
          opacity: 0.6;
        }

        100% {
          opacity: 0;
          transform: translate(calc(var(--dx) * 2), calc(var(--dy) * 2))
            scale(1.2);
        }
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
        }

        50% {
          opacity: 0.8;
        }
      }

      .navigation {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: var(--bg-nav);
        backdrop-filter: blur(15px);
        border-bottom: 2px solid var(--primary-color);
        z-index: 1000;
        padding: 15px 0;
        box-shadow: 0 4px 20px var(--shadow-color-strong);
        transition: all var(--transition-speed) ease;
      }

      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-home {
        font-size: 1.5em;
        font-weight: bold;
        color: var(--text-primary);
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .nav-home:hover {
        color: var(--primary-color);
        transform: scale(1.05);
      }

      .menu-toggle {
        display: none;
        background: none;
        border: none;
        font-size: 1.8em;
        cursor: pointer;
        color: var(--text-primary);
        transition: color var(--transition-speed) ease;
      }

      .menu-toggle:hover {
        color: var(--primary-color);
      }

      .nav-links {
        display: flex;
        gap: 25px;
        list-style: none;
      }

      .nav-links a {
        color: var(--text-primary);
        text-decoration: none;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: 25px;
        transition: all 0.3s ease;
        position: relative;
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: white;
        background: linear-gradient(
          45deg,
          var(--primary-color),
          var(--secondary-color)
        );
        transform: translateY(-2px);
        box-shadow: 0 5px 15px var(--shadow-color);
      }

      .main-content {
        margin-top: 100px;
        max-width: 1400px;
        margin-left: auto;
        margin-right: auto;
        padding: 0 20px;
        position: relative;
        min-height: calc(100vh - 140px);
      }

      .main-content::before {
        display: none;
      }

      .page-title {
        text-align: center;
        font-size: 3rem;
        margin-bottom: 30px;
        color: var(--text-primary);
        text-shadow:
          0 0 20px var(--primary-color),
          2px 2px 8px var(--shadow-color);
        animation: fadeInUp 0.8s ease-out;
      }

      .gallery-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        flex-wrap: wrap;
        gap: 20px;
        padding: 20px;
        background: linear-gradient(
          135deg,
          rgba(187, 134, 252, 0.1),
          rgba(3, 218, 198, 0.1)
        );
        border-radius: var(--border-radius);
        backdrop-filter: blur(5px);
        border-left: 4px solid var(--primary-color);
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 500;
        color: var(--text-secondary);
      }

      .breadcrumb span {
        cursor: pointer;
        border-radius: 10px;
        transition: all 0.3s ease;
      }

      .breadcrumb span:hover {
        background: var(--primary-color);
        color: white;
      }

      .view-controls {
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .control-group label {
        font-weight: 500;
        color: var(--text-secondary);
      }

      select,
      input[type="range"],
      input[type="text"] {
        padding: 8px 12px;
        border: 2px solid rgba(187, 134, 252, 0.3);
        border-radius: 10px;
        background: var(--bg-main);
        color: var(--text-primary);
        font-size: 14px;
        transition: all 0.3s ease;
      }

      input[type="text"]::placeholder {
        color: var(--text-secondary);
        opacity: 1;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 10px rgba(187, 134, 252, 0.3);
      }

      .size-slider {
        width: 160px;
        height: 6px;
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        outline: none;
        cursor: pointer;
        position: relative;
        border-radius: 10px;
      }

      .size-slider::-webkit-slider-runnable-track {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
      }

      .size-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
        border: 2px solid rgba(255, 255, 255, 0.8);
        cursor: grab;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        margin-top: -7px;
      }

      .size-slider::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.4);
      }

      .size-slider::-webkit-slider-thumb:active {
        cursor: grabbing;
        transform: scale(1.1);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      }

      .size-slider::-moz-range-track {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
      }

      .size-slider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
        border: 2px solid rgba(255, 255, 255, 0.8);
        cursor: grab;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .size-slider::-moz-range-thumb:hover {
        transform: scale(1.2);
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.4);
      }

      .size-slider::-moz-range-thumb:active {
        cursor: grabbing;
        transform: scale(1.1);
      }

      .size-slider::-moz-range-progress {
        background: transparent;
      }

      .folder-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .folder-item {
        background: linear-gradient(
          135deg,
          rgba(187, 134, 252, 0.1),
          rgba(3, 218, 198, 0.1)
        );
        border-radius: var(--border-radius);
        padding: 15px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid transparent;
        overflow: hidden;
        backdrop-filter: blur(10px);
      }

      .folder-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px var(--shadow-color-strong);
        border-color: var(--primary-color);
      }

      .folder-preview {
        width: 100%;
        height: 120px;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 15px;
        position: relative;
        background: var(--bg-main);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .folder-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: all 0.3s ease;
        border-radius: 10px;
      }

      .folder-item:hover .folder-preview img {
        transform: scale(1.1);
      }

      .folder-icon-fallback {
        font-size: 3rem;
        color: var(--secondary-color);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }

      .folder-name {
        font-weight: bold;
        color: var(--text-primary);
        margin-bottom: 5px;
        font-size: 1rem;
      }

      .folder-count {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      .image-grid {
        display: grid;
        gap: 20px;
        margin-bottom: 30px;
      }

      .grid-small {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }

      .grid-medium {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      }

      .grid-large {
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      }

      .grid-xlarge {
        grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
      }

      .image-item {
        position: relative;
        border-radius: var(--border-radius);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.3s ease;
        background: var(--bg-main);
        box-shadow: 0 5px 15px var(--shadow-color);
        border: 1px solid rgba(187, 134, 252, 0.1);
      }

      .image-item:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px var(--shadow-color-strong);
        border-color: var(--primary-color);
      }

      .image-item img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        transition: all 0.5s ease;
        opacity: 0;
      }

      .image-item img.loaded {
        opacity: 1;
      }

      .image-item:hover img {
        transform: scale(1.1);
      }

      .image-info {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
        color: white;
        padding: 20px 15px 15px;
        transform: translateY(100%);
        transition: all 0.3s ease;
      }

      .image-item:hover .image-info {
        transform: translateY(0);
      }

      .image-name {
        font-weight: bold;
        margin-bottom: 5px;
        font-size: 0.9rem;
      }

      .image-details {
        font-size: 0.8rem;
        opacity: 0.8;
      }

      .image-viewer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        display: none;
        z-index: 2000;
        align-items: center;
        justify-content: center;
      }

      .viewer-content {
        width: 100vw;
        height: 100vh;
        max-width: 100vw;
        max-height: 100vh;
        padding: 0;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      .viewer-image {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        display: block;
        margin: 0;
        padding: 0;
        background: #000;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        pointer-events: auto;
      }

      .viewer-controls {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 15px;
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 50px;
        backdrop-filter: blur(10px);
        z-index: 2500;
        max-width: 95vw;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .viewer-loader {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 255, 255, 0.1);
        border-top: 5px solid var(--primary-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        z-index: 2100;
        display: none;
      }

      @keyframes spin {
        0% {
          transform: translate(-50%, -50%) rotate(0deg);
        }

        100% {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      .viewer-btn {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 2rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      .viewer-btn:hover {
        transform: scale(1.15);
        background: var(--primary-color);
        box-shadow: 0 0 20px var(--primary-color);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .close-viewer {
        position: absolute;
        top: 25px;
        right: 25px;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.4);
        color: white;
        font-size: 2.5rem;
        line-height: 1;
        font-weight: 300;
        cursor: pointer;
        backdrop-filter: blur(15px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 3000;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        padding: 0;
        margin: 0;
      }

      .close-viewer:hover {
        background: var(--accent-color);
        transform: scale(1.1) rotate(90deg);
        box-shadow: 0 0 25px var(--accent-color);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .nav-arrows {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.4);
        color: white;
        font-size: 3rem;
        line-height: 1;
        font-weight: 300;
        cursor: pointer;
        backdrop-filter: blur(15px);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 3000;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        opacity: 0;
        padding: 0;
        margin: 0;
      }

      .nav-arrows:hover {
        background: var(--secondary-color);
        transform: translateY(-50%) scale(1.15);
        box-shadow: 0 0 30px var(--secondary-color);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .nav-prev {
        left: 20px;
      }

      .nav-next {
        right: 20px;
      }

      .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-top: 30px;
        flex-wrap: wrap;
      }

      .page-btn {
        padding: 10px 15px;
        border: none;
        border-radius: 10px;
        background: rgba(187, 134, 252, 0.1);
        color: var(--primary-color);
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
      }

      .page-btn:hover,
      .page-btn.active {
        background: var(--primary-color);
        color: white;
        transform: translateY(-2px);
      }

      .page-info {
        color: var(--text-secondary);
        font-weight: 500;
        margin: 0 15px;
      }

      @media (max-width: 768px) {
        .menu-toggle {
          display: block;
        }

        .nav-links {
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: var(--bg-nav);
          backdrop-filter: blur(15px);
          flex-direction: column;
          padding: 20px;
          transform: translateY(-100%);
          opacity: 0;
          visibility: hidden;
          transition: all 0.3s ease;
          box-shadow: 0 8px 25px var(--shadow-color-strong);
          border-radius: 0 0 var(--border-radius) var(--border-radius);
          z-index: 1001;
        }

        .nav-links.active {
          transform: translateY(0);
          opacity: 1;
          visibility: visible;
        }

        .main-content {
          margin-top: 80px;
          padding: 0 10px;
        }

        .unified-header {
          min-height: auto !important;
          padding: 30px 15px 15px 15px !important;
          margin-bottom: 20px;
          border-radius: 0 !important;
        }

        .header-overlay-fix {
          border-radius: 0 !important;
        }

        .unified-header h1 {
          font-size: 1.8em !important;
          min-height: auto;
          margin-bottom: 5px;
          line-height: 1.2;
        }

        .unified-header p {
          font-size: 0.9em !important;
          margin-bottom: 15px;
        }

        .filters-stats-flex {
          flex-direction: column;
          gap: 15px;
          align-items: stretch;
        }

        .filters {
          width: 100%;
          min-width: unset;
          min-height: auto !important;
          padding: 12px !important;
        }

        .stats-compact {
          width: 100%;
          min-width: unset;
          min-height: auto !important;
          padding: 12px !important;
        }

        .stats-compact h3 {
          font-size: 1.1em !important;
          margin-bottom: 15px !important;
        }

        .stat-card {
          padding: 15px 5px !important;
        }

        .stat-value {
          font-size: 1.5em !important;
        }

        .breadcrumb {
          font-size: 0.8em !important;
          padding: 8px 12px !important;
          border-radius: 8px !important;
        }

        .folder-grid {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 15px;
        }

        .folder-preview {
          height: 90px;
        }

        .folder-name {
          font-size: 0.85rem;
        }

        .grid-small {
          grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        }

        .grid-medium {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        }

        .grid-large {
          grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        }

        .grid-xlarge {
          grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        }
      }

      .viewer-controls {
        bottom: 10px;
        padding: 10px;
        max-width: 98vw;
      }

      .close-viewer {
        top: 10px;
        right: 10px;
        width: 48px;
        height: 48px;
        font-size: 1.2rem;
      }

      @media (max-width: 480px) {
        .unified-header h1 {
          font-size: 1.5em !important;
        }

        .unified-header p {
          font-size: 0.8em !important;
        }

        .folder-grid {
          grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
          gap: 10px;
        }

        .folder-preview {
          height: 70px;
        }

        .control-group {
          flex-direction: column;
          text-align: center;
          gap: 10px;
        }

        .size-slider {
          width: 100%;
          max-width: 200px;
        }

        .viewer-controls {
          bottom: 10px;
          flex-wrap: wrap;
          justify-content: center;
          gap: 15px;
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeInUp 0.6s ease;
      }

      .loading {
        text-align: center;
        padding: 40px;
        font-size: 1.2rem;
        color: var(--text-secondary);
      }

      .loading::after {
        content: "...";
        animation: dots 1.5s infinite;
      }

      @keyframes dots {
        0%,
        20% {
          content: "";
        }

        40% {
          content: ".";
        }

        60% {
          content: "..";
        }

        80%,
        100% {
          content: "...";
        }
      }

      .viewer-content:fullscreen {
        max-width: 100vw !important;
        max-height: 100vh !important;
      }

      .image-viewer:fullscreen {
        align-items: center;
        justify-content: center;
      }

      .nav-arrows {
        transition: opacity 0.4s;
      }

      .gallery-controls input[type="text"] {
        background: var(--bg-main) !important;
        color: var(--text-primary) !important;
        border: 2px solid rgba(187, 134, 252, 0.3);
      }

      .gallery-controls input[type="text"]::placeholder {
        color: var(--text-secondary);
        opacity: 1;
      }

      .skeleton-grid {
        display: grid;
        gap: 20px;
        width: 100%;
      }

      .skeleton-item {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.05) 25%,
          rgba(255, 255, 255, 0.1) 50%,
          rgba(255, 255, 255, 0.05) 75%
        );
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
        border-radius: var(--border-radius);
        height: 200px;
        border: 1px solid rgba(187, 134, 252, 0.1);
      }

      @keyframes skeleton-loading {
        0% {
          background-position: 200% 0;
        }

        100% {
          background-position: -200% 0;
        }
      }

      .fade-in {
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Header Unificado */
      .unified-header {
        background:
          linear-gradient(
            135deg,
            rgba(26, 26, 46, 0.4) 0%,
            rgba(22, 33, 62, 0.4) 50%,
            rgba(15, 52, 96, 0.4) 100%
          ),
          url("./Assets/Imagens/imagens_background.png") center center/cover
            no-repeat;
        position: relative;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 60px 60px 24px 60px;
        margin-bottom: 40px;
        min-height: 520px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        overflow: hidden;
        backdrop-filter: blur(10px);
      }

      .unified-header::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--secondary-color)
        );
        z-index: 3;
        border-radius: inherit;
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }

      .unified-header > * {
        position: relative;
        z-index: 2;
      }

      .header-overlay-fix {
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.75);
        border-radius: 20px;
        z-index: 1;
        pointer-events: none;
      }

      .unified-header h1 {
        color: #111 !important;
        font-size: 3em;
        margin-bottom: 15px;
        text-align: center;
        text-shadow:
          0 0 20px var(--primary-color),
          2px 2px 4px var(--shadow-color);
        min-height: 76px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .unified-header p {
        color: #111 !important;
        font-size: 1.2em;
        margin-bottom: 30px;
        text-align: center;
        text-shadow:
          0 0 10px var(--primary-color),
          1px 1px 2px var(--shadow-color);
      }

      .filters-stats-flex {
        display: flex;
        gap: 40px;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-top: auto;
        margin-bottom: 0;
      }

      .filters {
        flex: 2;
        min-width: 320px;
        border-radius: 18px !important;
        padding: 10px 10px 8px 10px !important;
        box-shadow: 0 2px 6px var(--shadow-color-strong);
        margin-bottom: 0;
        background: rgba(18, 18, 35, 0.6);
        backdrop-filter: blur(10px);
        min-height: 188px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .filter-row {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        align-items: flex-end;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 120px;
      }

      .filter-group label {
        font-weight: 600;
        color: var(--text-primary);
        font-size: 0.9em;
        text-align: left;
      }

      .filter-tags {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .filter-tag {
        background: linear-gradient(
          45deg,
          var(--primary-color),
          var(--secondary-color)
        );
        color: white;
        padding: 11px 16px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-size: 0.9em;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .filter-tag:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px var(--shadow-color);
      }

      .stats-compact {
        flex: 1;
        min-width: 220px;
        background: rgba(18, 18, 35, 0.6);
        border-radius: 18px !important;
        padding: 8px 8px 4px 8px !important;
        box-shadow: 0 2px 6px var(--shadow-color-strong);
        margin-bottom: 0;
        backdrop-filter: blur(10px);
        min-height: 181px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .stats-compact .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .stat-card {
        background: rgba(187, 134, 252, 0.1);
        border-radius: 10px;
        box-shadow: 0 2px 8px var(--shadow-color);
        padding: 10px 0 6px 0;
        text-align: center;
      }

      .stat-value {
        font-size: 1.3em;
        font-weight: bold;
        color: var(--text-primary);
      }

      .stat-label {
        font-size: 0.9em;
        color: var(--text-secondary);
      }
    
    /* SVG Icon System */
    .icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      vertical-align: -0.125em;
      fill: currentColor;
      stroke: currentColor;
      flex-shrink: 0;
    }
    .icon-stroke {
      fill: none;
    }
</style>

    <script>
      const performanceConfig = {
        maxStars: window.innerWidth > 768 ? 150 : 80,
        staticStars: window.innerWidth > 768 ? 40 : 20,
      };
      function createStarfield() {
        const starfield = document.getElementById("starfield");
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        starfield.innerHTML = "";
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < performanceConfig.maxStars; i++) {
          const star = document.createElement("div");
          star.className = "star";
          const angle = Math.random() * 2 * Math.PI;
          const initialRadius = Math.random() * 50 + 10;
          const startX = centerX + Math.cos(angle) * initialRadius;
          const startY = centerY + Math.sin(angle) * initialRadius;
          const directionX = Math.cos(angle);
          const directionY = Math.sin(angle);
          const maxDistance = Math.sqrt(
            Math.pow(window.innerWidth, 2) + Math.pow(window.innerHeight, 2),
          );
          const travelDistance = maxDistance * (0.7 + Math.random() * 0.5);
          const starType = Math.random();
          if (starType < 0.7) {
            star.classList.add("distant");
          } else if (starType < 0.9) {
            star.classList.add("medium");
          } else {
            star.classList.add("close");
          }
          const colorType = Math.random();
          if (colorType < 0.1) {
            star.classList.add("blue");
          } else if (colorType < 0.2) {
            star.classList.add("yellow");
          }
          star.style.left = startX + "px";
          star.style.top = startY + "px";
          star.style.setProperty("--dx", directionX * travelDistance + "px");
          star.style.setProperty("--dy", directionY * travelDistance + "px");
          star.style.animationDelay = Math.random() * 25 + "s";
          fragment.appendChild(star);
        }
        for (let i = 0; i < performanceConfig.staticStars; i++) {
          const staticStar = document.createElement("div");
          staticStar.className = "star distant";
          staticStar.style.position = "absolute";
          staticStar.style.left = Math.random() * window.innerWidth + "px";
          staticStar.style.top = Math.random() * window.innerHeight + "px";
          staticStar.style.opacity = Math.random() * 0.4 + 0.1;
          staticStar.style.animation = `twinkle ${3 + Math.random() * 4}s ease-in-out infinite alternate`;
          staticStar.style.animationDelay = Math.random() * 2 + "s";
          fragment.appendChild(staticStar);
        }
        starfield.appendChild(fragment);
      }
      let currentFolder = "/";
      let currentImages = [];
      let currentPage = 1;
      let itemsPerPage = 24;
      let imageSize = "medium";
      let currentImageIndex = 0;
      let viewerZoom = 1;
      let viewerRotation = 0;
      let viewMode = "grid";
      let isDragging = false;
      let dragStartX = 0;
      let dragStartY = 0;
      let imageOffsetX = 0;
      let imageOffsetY = 0;
      let lastImageOffsetX = 0;
      let lastImageOffsetY = 0;
      let touchStartX = 0;
      let touchStartY = 0;
      let lastTouchDistance = 0;
      let wasPinch = false;
      let galleryData = {};
      let rawImagesIndex = null;
      let pathMap = {};
      function toggleMenu() {
        const navLinks = document.getElementById("navLinks");
        const menuToggle = document.querySelector(".menu-toggle");
        const isActive = navLinks.classList.toggle("active");
        menuToggle.setAttribute("aria-expanded", isActive);
        menuToggle.setAttribute(
          "aria-label",
          isActive ? "Fechar menu de navegação" : "Abrir menu de navegação",
        );
      }
      document.addEventListener("click", function (e) {
        const nav = document.querySelector(".navigation");
        const navLinks = document.getElementById("navLinks");
        const menuToggle = document.querySelector(".menu-toggle");
        if (!nav.contains(e.target) && navLinks.classList.contains("active")) {
          navLinks.classList.remove("active");
          menuToggle.setAttribute("aria-expanded", "false");
          menuToggle.setAttribute("aria-label", "Abrir menu de navegação");
        }
      });
      document.addEventListener("keydown", function (e) {
        if (
          e.key === "Escape" &&
          document.getElementById("navLinks").classList.contains("active")
        ) {
          toggleMenu();
        }
      });
      async function loadImagesData() {
        try {
          console.log("Iniciando carregamento do índice de imagens...");
          const response = await fetch("./Assets/Imagens/images-index.json");
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          rawImagesIndex = await response.json();
          console.log("Índice carregado:", rawImagesIndex);

          try {
            let totalImagesCount = 0;
            Object.values(rawImagesIndex).forEach(
              (folder) => (totalImagesCount += countItemsInFolder(folder)),
            );
            const totalFoldersCount = Object.keys(rawImagesIndex).length;

            const displayTotalImages =
              document.getElementById("displayTotalImages");
            const displayTotalFolders = document.getElementById(
              "displayTotalFolders",
            );

            if (displayTotalImages)
              displayTotalImages.textContent = totalImagesCount;
            if (displayTotalFolders)
              displayTotalFolders.textContent = totalFoldersCount;
          } catch (e) {
            console.warn("Erro ao calcular estatísticas:", e);
          }
          galleryData = { "/": { folders: [], images: [] } };
          pathMap = { "/": { _root: true } };
          galleryData["/"].folders = Object.keys(rawImagesIndex).map(
            (folderName) => {
              const folderData = rawImagesIndex[folderName];
              const path = `/${folderName.toLowerCase().replace(/\s+/g, "-")}`;
              pathMap[path] = folderData;
              return {
                name: folderName,
                icon: getFolderIcon(folderName),
                count: `${countItemsInFolder(folderData)} imagens`,
                path: path,
                preview:
                  folderData._cover || getFirstImageFromFolder(folderData)
                    ? convertGoogleDriveLink(
                        folderData._cover ||
                          getFirstImageFromFolder(folderData),
                        "w600",
                      )
                    : null,
              };
            },
          );
          console.log("Menu principal pronto (Lazy Mode).");
          const urlParams = new URLSearchParams(window.location.search);
          const folderParam = urlParams.get("folder") || "/";
          const pageParam = urlParams.get("page");
          currentFolder = folderParam;
          if (pageParam) {
            currentPage = parseInt(pageParam) || 1;
          }
          window.history.replaceState(
            { folder: currentFolder, page: currentPage },
            "",
            window.location.href,
          );
          if (currentFolder !== "/") {
            ensurePathIsMapped(currentFolder, rawImagesIndex);
          }
          loadGalleryContent(false);
          window.onpopstate = function (event) {
            if (event.state) {
              currentFolder = event.state.folder || "/";
              currentPage = event.state.page || 1;
              loadGalleryContent(false);
            }
          };
        } catch (error) {
          console.error("Erro ao carregar índice de imagens:", error);
          const content = document.getElementById("galleryContent");
          content.innerHTML = `
                    <div class="loading" style="color: var(--primary-coral);">
                        <svg class="icon icon-stroke"><use href="#i-x-circle"/></svg> Erro ao carregar imagens<br>
                        <small>Verifique a conexão com a internet e tente novamente</small>
                        <br><br>
                        <button onclick="loadImagesData()" style="padding: 10px 20px; background: var(--button-gradient); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px;"><svg class="icon icon-stroke"><use href="#i-refresh"/></svg> Tentar Novamente</button>
                    </div>
                `;
        }
      }
      function convertGoogleDriveLink(driveLink, size = "s0") {
        const match =
          driveLink.match(/\/d\/([a-zA-Z0-9-_]+)/) ||
          driveLink.match(/[?&]id=([a-zA-Z0-9-_]+)/);
        if (match) {
          const fileId = match[1];
          return `https://drive.google.com/thumbnail?id=${fileId}&sz=${size}`;
        }
        return driveLink;
      }
      function processFolderLevel(folderData, folderName, parentPath = "") {
        const result = { folders: [], images: [] };
        const currentPath =
          parentPath === "/"
            ? `/${folderName.toLowerCase().replace(/\s+/g, "-")}`
            : `${parentPath}/${folderName.toLowerCase().replace(/\s+/g, "-")}`;
        if (folderData._files && folderData._files.length > 0) {
          result.images = folderData._files.map((link, index) => ({
            id: `${folderName}_${index}`,
            name: `Imagem ${index + 1}`,
            url: convertGoogleDriveLink(link, "s0"),
            thumbnail: convertGoogleDriveLink(link, "w600"),
            size: "Desconhecido",
            type: "JPG",
            date: new Date().toLocaleDateString("pt-BR"),
            resolution: "",
          }));
        }
        Object.entries(folderData).forEach(([key, value]) => {
          if (
            key !== "_files" &&
            key !== "_cover" &&
            typeof value === "object"
          ) {
            const subPath =
              currentPath === "/"
                ? `/${key.toLowerCase().replace(/\s+/g, "-")}`
                : `${currentPath}/${key.toLowerCase().replace(/\s+/g, "-")}`;
            pathMap[subPath] = value;
            result.folders.push({
              name: key,
              icon: getFolderIcon(key),
              count: countItemsInFolder(value),
              path: subPath,
              preview:
                value._cover || getFirstImageFromFolder(value)
                  ? convertGoogleDriveLink(
                      value._cover || getFirstImageFromFolder(value),
                      "w600",
                    )
                  : null,
            });
          }
        });
        return result;
      }
      function getFirstImageFromFolder(folderData) {
        if (folderData._files && folderData._files.length > 0)
          return folderData._files[0];
        for (const [key, value] of Object.entries(folderData)) {
          if (key !== "_files" && typeof value === "object") {
            const found = getFirstImageFromFolder(value);
            if (found) return found;
          }
        }
        return null;
      }
      function countItemsInFolder(folderData) {
        let count = folderData._files ? folderData._files.length : 0;
        for (const [key, value] of Object.entries(folderData)) {
          if (key !== "_files" && typeof value === "object")
            count += countItemsInFolder(value);
        }
        return count;
      }
      function ensurePathIsMapped(targetPath, rootData) {
        const parts = targetPath.split("/").filter((p) => p);
        let currentData = rootData;
        let builtPath = "";
        for (const part of parts) {
          const keys = Object.keys(currentData);
          const originalKey = keys.find(
            (k) => k.toLowerCase().replace(/\s+/g, "-") === part,
          );
          if (originalKey) {
            builtPath += `/${part}`;
            currentData = currentData[originalKey];
            pathMap[builtPath] = currentData;
          } else break;
        }
      }
      function getFolderIcon(folderName) {
        const icons = {
          Alessa: '<svg class="icon icon-stroke"><use href="#i-masks"/></svg>',
          Aurora: '<svg class="icon icon-stroke"><use href="#i-sparkles"/></svg>',
          "Avril Lavigne": '<svg class="icon icon-stroke"><use href="#i-mic"/></svg>',
          "Emily Browning": '<svg class="icon"><use href="#i-glow-star"/></svg>',
          "Luna Lovegood": '<svg class="icon icon-stroke"><use href="#i-bird"/></svg>',
          "Nier Automata": '<svg class="icon icon-stroke"><use href="#i-bot"/></svg>',
          "t.A.T.u": '<svg class="icon icon-stroke"><use href="#i-music"/></svg>',
        };
        return icons[folderName] || '<svg class="icon icon-stroke"><use href="#i-folder"/></svg>';
      }
      function navigateToFolder(path) {
        currentFolder = path;
        currentPage = 1;
        const searchInput = document.getElementById("searchInput");
        if (searchInput) {
          searchInput.value = "";
        }
        updateBreadcrumb();
        loadGalleryContent(true);
      }
      function updateBreadcrumb() {
        const breadcrumb = document.getElementById("breadcrumb");
        const pathParts = currentFolder.split("/").filter((part) => part);
        let html = `<span onclick=\"navigateToFolder('/')\"><svg class="icon icon-stroke"><use href="#i-home"/></svg> Início</span>`;
        let currentPath = "";
        pathParts.forEach((part) => {
          currentPath += "/" + part;
          const displayName = part
            .replace(/-/g, " ")
            .replace(/\b\w/g, (l) => l.toUpperCase());
          html += ` › <span onclick="navigateToFolder('${currentPath}')">${displayName}</span>`;
        });
        breadcrumb.innerHTML = html;
      }
      function loadGalleryContent(shouldPushState = true) {
        if (!galleryData[currentFolder]) {
          const rawData = pathMap[currentFolder];
          if (rawData) {
            const folderName = currentFolder.split("/").pop() || "Root";
            galleryData[currentFolder] = processFolderLevel(
              rawData,
              folderName,
              currentFolder.split("/").slice(0, -1).join("/"),
            );
          } else {
            console.error(
              "Dados não encontrados para o caminho:",
              currentFolder,
            );
          }
        }
        if (shouldPushState) {
          const url = new URL(window.location);
          url.searchParams.set("folder", currentFolder);
          url.searchParams.set("page", currentPage);
          window.history.pushState(
            { folder: currentFolder, page: currentPage },
            "",
            url,
          );
        }
        const content = document.getElementById("galleryContent");
        const data = galleryData[currentFolder];
        const pagination = document.getElementById("pagination");
        if (!data) {
          content.innerHTML = '<div class="loading">Pasta não encontrada</div>';
          pagination.innerHTML = "";
          pagination.style.display = "none";
          return;
        }
        const skeletonHTML = `
                <div class="skeleton-grid grid-${imageSize}">
                    ${Array(itemsPerPage).fill('<div class="skeleton-item"></div>').join("")}
                </div>
            `;
        content.innerHTML = skeletonHTML;
        setTimeout(() => {
          let html = "";
          let hasImages = data.images && data.images.length > 0;
          const imageControls = document.getElementById("imageControls");
          if (imageControls) {
            imageControls.style.display = hasImages ? "flex" : "none";
          }
          if (data.folders && data.folders.length > 0) {
            html += '<div class="folder-grid fade-in">';
            data.folders.forEach((folder) => {
              html += `
                            <div class="folder-item" onclick="navigateToFolder('${folder.path}')">
                                <div class="folder-preview">
                                    <img src="${folder.preview}" alt="${folder.name}" 
                                        onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
                                        loading="lazy">
                                    <div class="folder-icon-fallback" style="display: none;">${folder.icon}</div>
                                </div>
                                <div class="folder-name">${folder.name}</div>
                                <div class="folder-count">${folder.count}</div>
                            </div>
                        `;
            });

      function formatFileSize(bytes) {
        const sizes = ["Bytes", "KB", "MB", "GB"];
        if (bytes === 0) return "0 Bytes";
        const i = Math.floor(Math.log(bytes) / Math.log(1024));
        return (
          Math.round((bytes / Math.pow(1024, i)) * 100) / 100 + " " + sizes[i]
        );
      }
      function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
          const later = () => {
            clearTimeout(timeout);
            func(...args);
          };
          clearTimeout(timeout);
          timeout = setTimeout(later, wait);
        };
      }
      function saveSettings() {
        const settings = {
          imageSize: imageSize,
          itemsPerPage: itemsPerPage,
          currentFolder: currentFolder,
        };
        console.log("Configurações salvas:", settings);
      }
      function loadSettings() {
        console.log("Configurações carregadas");
      }
      function toggleFullscreenViewer() {
        const viewer = document.getElementById("imageViewer");
        if (!document.fullscreenElement) {
          viewer.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      }
      function exportImageList() {
        const data = galleryData[currentFolder] || { images: [] };
        const csvContent =
          "data:text/csv;charset=utf-8," +
          "Nome,Tamanho,Tipo,Data,URL\n" +
          data.images
            .map(
              (img) =>
                `"${img.name}","${img.size}","${img.type}","${img.date}","${img.url}"`,
            )
            .join("\n");
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute(
          "download",
          `imagens_${currentFolder.replace(/\//g, "_")}.csv`,
        );
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }
      function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
      }
      function showNavArrows() {
        console.log("showNavArrows called");
        const prevArrow = document.querySelector(".nav-arrows.nav-prev");
        const nextArrow = document.querySelector(".nav-arrows.nav-next");
        console.log("Indices:", currentImageIndex, currentImages.length);
        if (prevArrow && currentImageIndex > 0) {
          prevArrow.style.opacity = "1";
          console.log("Prev arrow opacity set to 1");
        }
        if (nextArrow && currentImageIndex < currentImages.length - 1) {
          nextArrow.style.opacity = "1";
          console.log("Next arrow opacity set to 1");
        }
      }
      function hideNavArrows() {
        console.log("hideNavArrows called");
        const prevArrow = document.querySelector(".nav-arrows.nav-prev");
        const nextArrow = document.querySelector(".nav-arrows.nav-next");
        if (prevArrow) prevArrow.style.opacity = "0";
        if (nextArrow) nextArrow.style.opacity = "0";
      }
      function updateNavArrowsState() {
        const prevArrow = document.querySelector(".nav-arrows.nav-prev");
        const nextArrow = document.querySelector(".nav-arrows.nav-next");
        if (prevArrow) {
          const canGoBack = currentImageIndex > 0;
          prevArrow.style.display = canGoBack ? "flex" : "none";
          if (!canGoBack) prevArrow.style.opacity = "0";
        }
        if (nextArrow) {
          const canGoForward = currentImageIndex < currentImages.length - 1;
          nextArrow.style.display = canGoForward ? "flex" : "none";
          if (!canGoForward) nextArrow.style.opacity = "0";
        }
      }
      function addNavArrowsInteractionListeners() {
        const viewer = document.getElementById("imageViewer");
        const viewerContent = document.querySelector(".viewer-content");
        const viewerImage = document.getElementById("viewerImage");
        const arrows = document.querySelectorAll(".nav-arrows");

        const handleInteraction = () => {
          if (viewer.style.display === "flex") {
            showNavArrows();
          }
        };

        if (viewer) {
          viewer.addEventListener("mousemove", handleInteraction);
          viewer.addEventListener("click", handleInteraction);
          viewer.addEventListener("touchstart", handleInteraction, {
            passive: true,
          });
          viewer.addEventListener("touchmove", handleInteraction, {
            passive: true,
          });
        }
        if (viewerContent) {
          viewerContent.addEventListener("mousemove", handleInteraction);
        }
        if (viewerImage) {
          viewerImage.addEventListener("mousemove", handleInteraction);
          viewerImage.addEventListener("click", handleInteraction);
        }

        arrows.forEach((arrow) => {
          arrow.addEventListener("mouseenter", () => {
            clearTimeout(navArrowsTimeout);
            const isPrev = arrow.classList.contains("nav-prev");
            if (isPrev && currentImageIndex > 0) arrow.style.opacity = "1";
            if (!isPrev && currentImageIndex < currentImages.length - 1)
              arrow.style.opacity = "1";
          });
          arrow.addEventListener("mousemove", (e) => {
            e.stopPropagation();
            clearTimeout(navArrowsTimeout);
            const isPrev = arrow.classList.contains("nav-prev");
            if (isPrev && currentImageIndex > 0) arrow.style.opacity = "1";
            if (!isPrev && currentImageIndex < currentImages.length - 1)
              arrow.style.opacity = "1";
            navArrowsTimeout = setTimeout(hideNavArrows, 2500);
          });
          arrow.addEventListener("mouseleave", () => {
            clearTimeout(navArrowsTimeout);
            navArrowsTimeout = setTimeout(hideNavArrows, 2500);
          });
        });
      }
      function updateSliderBackground(slider) {
        const min = slider.min ? parseFloat(slider.min) : 1;
        const max = slider.max ? parseFloat(slider.max) : 4;
        const val = parseFloat(slider.value);
        const percent = ((val - min) / (max - min)) * 100;
        const thumbWidth = 22;
        const sliderWidth = slider.offsetWidth;
        const thumbOffset = (thumbWidth / sliderWidth) * 100;
        const adjustedPercent =
          percent - thumbOffset / 2 + (percent * thumbOffset) / 100;
        slider.style.background = `linear-gradient(90deg, var(--primary-color) ${adjustedPercent}%, rgba(255, 255, 255, 0.1) ${adjustedPercent}%)`;
      }
    </script>
