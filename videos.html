<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="./Assets/Home/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📹 Vídeos - Galeria Musical</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --accent-color: #cf6679;
            --text-primary: #e1e1e1;
            --text-secondary: #b3b3b3;
            --bg-main: rgba(18, 18, 35, 0.98);
            --bg-nav: rgba(18, 18, 35, 0.98);
            --shadow-color: rgba(0, 0, 0, 0.4);
            --shadow-color-strong: rgba(0, 0, 0, 0.6);
            --transition-speed: 0.3s;
            --border-radius: 15px;
        }

        body {
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Starfield background */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
            opacity: 1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: star-travel linear infinite;
        }

        .star.distant {
            width: 1px;
            height: 1px;
            animation-duration: 25s;
            box-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
        }

        .star.medium {
            width: 1.5px;
            height: 1.5px;
            animation-duration: 15s;
            box-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
        }

        .star.close {
            width: 2px;
            height: 2px;
            animation-duration: 8s;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.7);
        }

        .star.blue {
            background: #e6f3ff;
            box-shadow: 0 0 6px rgba(173, 216, 255, 0.6);
        }

        .star.yellow {
            background: #fff8e1;
            box-shadow: 0 0 4px rgba(255, 248, 225, 0.5);
        }

        @keyframes star-travel {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.5);
            }

            10% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
                transform: translate(var(--dx), var(--dy)) scale(1);
            }

            90% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
                transform: translate(calc(var(--dx) * 2), calc(var(--dy) * 2)) scale(1.5);
            }
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 0.8;
            }
        }

        /* Navegação */
        .navigation {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-nav);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary-color);
            z-index: 1000;
            padding: 15px 0;
            box-shadow: 0 2px 20px var(--shadow-color-strong);
            transition: all var(--transition-speed) ease;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .nav-home {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-home:hover {
            color: var(--primary-color);
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: white;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text-primary);
        }

        /* Responsividade navegação */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--bg-nav);
                flex-direction: column;
                padding: 20px;
                box-shadow: 0 5px 20px var(--shadow-color-strong);
                border-radius: 0 0 15px 15px;
            }

            .nav-links.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }

        /* Header Unificado */
        .unified-header {
            background: url('./Assets/Videos/videos_background.jpg') center center/cover no-repeat, linear-gradient(135deg, rgba(26, 26, 46, 0.4) 0%, rgba(22, 33, 62, 0.4) 50%, rgba(15, 52, 96, 0.4) 100%);
            position: relative;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.10);
            padding: 60px 60px 24px 60px;
            margin-bottom: 40px;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }

        .unified-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            z-index: 3;
            border-radius: inherit;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .unified-header>* {
            position: relative;
            z-index: 2;
        }

        .header-overlay-fix {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 20px;
            z-index: 1;
            pointer-events: none;
        }

        .unified-header h1 {
            color: #111 !important;
            font-size: 3em;
            margin-bottom: 15px;
            text-align: center;
            text-shadow:
                0 0 20px var(--primary-color),
                2px 2px 4px var(--shadow-color);
        }

        .unified-header p {
            color: #111 !important;
            font-size: 1.2em;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 10px var(--primary-color), 1px 1px 2px var(--shadow-color);
        }

        .filters-stats-flex {
            display: flex;
            gap: 40px;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: auto;
            margin-bottom: 0;
        }

        .filters {
            flex: 2;
            min-width: 320px;
            border-radius: 18px !important;
            padding: 10px 10px 8px 10px !important;
            box-shadow: 0 2px 6px var(--shadow-color-strong);
            margin-bottom: 0;
            background: rgba(18, 18, 35, 0.6);
            backdrop-filter: blur(10px);
            min-height: 188px;
        }

        .filter-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 120px;
        }

        .filter-group select,
        .filter-group input {
            padding: 10px;
            border: 2px solid rgba(187, 134, 252, 0.3);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(18, 18, 35, 0.8);
            color: var(--text-primary);
        }

        .filter-group select:focus,
        .filter-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(187, 134, 252, 0.1);
            outline: none;
        }

        #searchInput {
            min-width: 250px;
            width: 100%;
            max-width: 350px;
        }

        .filter-group label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9em;
            text-align: left;
        }

        .filter-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-tag {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .filter-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .filter-tag.active {
            background: linear-gradient(45deg, var(--accent-color), var(--primary-color));
            box-shadow: 0 5px 15px rgba(207, 102, 121, 0.4);
        }

        .stats-compact {
            flex: 1;
            min-width: 220px;
            background: rgba(18, 18, 35, 0.6);
            border-radius: 18px !important;
            padding: 8px 8px 4px 8px !important;
            box-shadow: 0 2px 6px var(--shadow-color-strong);
            margin-bottom: 0;
            backdrop-filter: blur(10px);
            min-height: 181px;
        }

        .stats-compact .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: rgba(187, 134, 252, 0.1);
            border-radius: 10px;
            box-shadow: 0 2px 8px var(--shadow-color);
            padding: 10px 0 6px 0;
            text-align: center;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.9em;
            color: var(--text-secondary);
        }

        @media (max-width: 900px) {
            .filters-stats-flex {
                flex-direction: column;
                gap: 20px;
                align-items: stretch;
            }

            .filters,
            .stats-compact {
                width: 100%;
                min-width: unset;
                margin-bottom: 0;
                margin-top: 0;
            }
        }

        /* Grade de Vídeos */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            margin-bottom: 80px;
        }

        /* Card de vídeo individual */
        .video-card {
            background: var(--bg-main);
            border-radius: var(--border-radius);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 10px 30px var(--shadow-color);
            cursor: pointer;
            position: relative;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
            transform: translateY(30px);
            border: 1px solid rgba(187, 134, 252, 0.1);
        }

        .video-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 35px 70px var(--shadow-color-strong);
            border-color: var(--primary-color);
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
            transition: transform 0.4s ease;
        }

        .video-card:hover .video-thumbnail {
            transform: scale(1.05);
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.2rem;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0.9;
            z-index: 2;
            box-shadow: 0 15px 35px var(--shadow-color);
        }

        .video-card:hover .play-overlay {
            transform: translate(-50%, -50%) scale(1.3) rotate(360deg);
            opacity: 1;
            box-shadow: 0 20px 50px var(--shadow-color-strong);
        }

        .video-info {
            padding: 20px;
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
            transition: all 0.3s ease;
        }

        .video-artist {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1rem;
            position: relative;
        }

        .video-artist::before {
            content: '🎵';
            margin-right: 8px;
            font-size: 0.9rem;
        }

        .video-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .video-category {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 3;
            box-shadow: 0 5px 15px var(--shadow-color);
            transition: all 0.3s ease;
        }

        .video-card:hover .video-category {
            transform: scale(1.1);
            box-shadow: 0 8px 25px var(--shadow-color-strong);
        }

        .video-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(187, 134, 252, 0.1);
        }

        /* Modal de vídeo */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(18, 18, 35, 0.98);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1125px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: var(--border-radius);
            overflow: hidden;
            animation: modalSlideIn 0.5s ease;
            box-shadow: 0 20px 60px var(--shadow-color-strong);
            border: 2px solid rgba(187, 134, 252, 0.2);
        }

        .modal-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: var(--accent-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all var(--transition-speed) ease;
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .modal-close:hover {
            transform: rotate(90deg) scale(1.1);
            background: var(--primary-color);
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Floating elements do tema */
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-note {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.15;
            animation: float 12s ease-in-out infinite;
            color: var(--secondary-color);
            text-shadow: 0 0 20px var(--primary-color);
            filter: blur(0.5px);
        }

        .floating-note:nth-child(1) {
            top: 15%;
            left: 8%;
            animation-delay: 0s;
        }

        .floating-note:nth-child(2) {
            top: 70%;
            right: 12%;
            left: auto;
            animation-delay: 3s;
        }

        .floating-note:nth-child(3) {
            top: 85%;
            left: 25%;
            animation-delay: 6s;
        }

        .floating-note:nth-child(4) {
            top: 25%;
            right: 20%;
            left: auto;
            animation-delay: 9s;
        }

        .floating-note:nth-child(5) {
            top: 45%;
            left: 5%;
            animation-delay: 1s;
        }

        .floating-note:nth-child(6) {
            top: 55%;
            right: 35%;
            left: auto;
            animation-delay: 4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg) scale(1);
            }

            25% {
                transform: translateY(-15px) rotate(3deg) scale(1.05);
            }

            50% {
                transform: translateY(-25px) rotate(-2deg) scale(0.95);
            }

            75% {
                transform: translateY(-10px) rotate(4deg) scale(1.02);
            }
        }

        /* Animações */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.8) rotate(5deg);
            }

            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .container {
                margin-top: 100px;
                padding: 0 15px;
            }

            .unified-header {
                border-radius: 0 !important;
                padding: 40px 20px 20px 20px !important;
                min-height: 400px;
            }

            .filters,
            .stats-compact {
                flex: 1 1 auto !important;
                padding: 6px 4px 4px 4px !important;
                border-radius: 12px !important;
            }

            .filter-tag,
            .stat-value,
            .stat-label {
                font-size: 0.95em;
            }

            .filters .filter-group label {
                font-size: 0.85em;
            }

            #searchInput {
                min-width: 200px;
                max-width: 100%;
            }

            .videos-grid {
                grid-template-columns: 1fr;
                gap: 20px;
                margin-bottom: 60px;
            }

            .modal-content {
                width: 100vw;
                max-width: 100vw;
                margin: 0;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 10px;
            }

            .unified-header {
                padding: 30px 15px 15px 15px !important;
                min-height: 350px;
            }

            .unified-header h1 {
                font-size: 2.2em;
            }

            .unified-header p {
                font-size: 1.1em;
            }

            .filters-stats-flex {
                gap: 20px;
            }

            #searchInput {
                min-width: 180px;
                max-width: 100%;
            }

            .videos-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        @media (max-width: 1200px) {
            .modal-content {
                max-width: 98vw;
            }
        }

        /* Container Principal */
        .container {
            max-width: 1400px;
            margin: 100px auto 0 auto;
            padding: 0 20px;
            position: relative;
        }

        /* Acessibilidade */
        .nav-links a:focus,
        .filter-btn:focus,
        .menu-toggle:focus {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <!-- Campo de Estrelas -->
    <div class="starfield" id="starfield"></div>

    <!-- Navegação -->
    <nav class="navigation">
        <div class="nav-container">
            <a href="index.html" class="nav-home">🏠 Home</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="animes.html">🎌 Animes</a></li>
                <li><a href="filmes.html">🎬 Filmes</a></li>
                <li><a href="jogos.html">🎮 Jogos</a></li>
                <li><a href="musicas.html">🎵 Músicas</a></li>
                <li><a href="imagens.html">🖼️ Imagens</a></li>
                <li><a href="videos.html" class="active">📹 Vídeos</a></li>
            </ul>
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        </div>
    </nav>

    <!-- Modal do Player -->
    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeVideo()">&times;</button>
            <iframe id="videoPlayer" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

    <!-- Container Principal -->
    <div class="container">
        <!-- Header Unificado com Filtros e Estatísticas -->
        <div class="header unified-header">
            <div class="header-overlay-fix"></div>
            <h1><span style="font-size:1.2em;">📹</span> Vídeos</h1>
            <p>CLIPES MUSICAIS FAVORITOS</p>
            <div class="filters-stats-flex">
                <div class="filters">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label>Categoria:</label>
                            <div class="filter-tags" id="filters">
                                <!-- Botões gerados dinamicamente via JS -->
                            </div>
                        </div>
                    </div>
                    <div class="filter-row">
                        <div class="filter-group">
                            <label>🔍 Buscar:</label>
                            <input type="text" id="searchInput" placeholder="Digite o Título ou Artista"
                                oninput="searchVideos()">
                        </div>
                    </div>
                </div>
                <div class="stats stats-compact">
                    <h3 style="font-size:1.1em; margin-bottom:10px; text-align:center;">📊 Estatísticas da Coleção</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="totalVideos">0</div>
                            <div class="stat-label">Total de Vídeos</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="currentVideos">0</div>
                            <div class="stat-label">Exibindo</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="categoriesCount">0</div>
                            <div class="stat-label">Artistas</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="avgRating">0</div>
                            <div class="stat-label">Nota Média</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <!-- Grade de Vídeos -->
        <div class="videos-grid" id="videosGrid">
            <!-- Os vídeos serão inseridos aqui pelo JavaScript -->
        </div>
    </div>

    <script>
        // Dados dos vídeos com mais informações
        let videosData = [];

        let currentFilter = 'Todos';

        // Função para renderizar vídeos
        
        async function fetchVideos() {
            try {
                const response = await fetch('./Assets/Videos/minha_lista_videos.json');
                const data = await response.json();
                videosData = data.videos || [];
                renderVideos(videosData);
                createFilters();
                updateStats();
            } catch (err) {
                console.error("Erro ao carregar vídeos:", err);
            }
        }


        function renderVideos(videos = videosData) {
            const grid = document.getElementById('videosGrid');
            grid.innerHTML = '';

            videos.forEach((video, index) => {
                const videoCard = document.createElement('div');
                videoCard.className = 'video-card';
                videoCard.dataset.category = video.category;
                videoCard.onclick = () => playVideo(video.url);

                videoCard.innerHTML = `
                    <div class="video-thumbnail" style="background-image: url('${video.thumbnail}')">
                        <div class="play-overlay">▶</div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                        <p class="video-artist">${video.artist}</p>
                        <p class="video-description">${video.description}</p>
                        <div class="video-stats">
                        </div>
                    </div>
                `;

                grid.appendChild(videoCard);

                // Animação de entrada com delay
                setTimeout(() => {
                    videoCard.style.opacity = '1';
                    videoCard.style.transform = 'translateY(0)';
                }, index * 100);
            });

            // Atualizar estatísticas após renderizar
            updateStats();
        }

        // Função para filtrar vídeos
        function filterVideos(category) {
            currentFilter = category;

            // Atualizar classes dos botões
            document.querySelectorAll('.filter-tag').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.trim() === category);
            });

            // Filtrar dados
            const filteredVideos = category === 'Todos'
                ? videosData
                : videosData.filter(video => video.category === category);

            renderVideos(filteredVideos);
            updateStats();
        }

        // Função para buscar vídeos
        function searchVideos() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filteredVideos = videosData;

            // Aplicar filtro de categoria primeiro
            if (currentFilter !== 'Todos') {
                filteredVideos = filteredVideos.filter(video => video.category === currentFilter);
            }

            // Aplicar busca por título ou artista
            if (searchTerm) {
                filteredVideos = filteredVideos.filter(video =>
                    video.title.toLowerCase().includes(searchTerm) ||
                    video.artist.toLowerCase().includes(searchTerm) ||
                    (video.description && video.description.toLowerCase().includes(searchTerm))
                );
            }

            renderVideos(filteredVideos);
            updateStats();
        }

        // Função para atualizar estatísticas
        function updateStats() {
            const visibleVideos = document.querySelectorAll('.video-card').length;
            const totalVideos = videosData.length;
            const categories = [...new Set(videosData.map(video => video.category))].length;

            document.getElementById('totalVideos').textContent = totalVideos;
            document.getElementById('currentVideos').textContent = visibleVideos;
            document.getElementById('categoriesCount').textContent = categories;
            document.getElementById('avgRating').textContent = 'N/A'; // Não temos ratings nos vídeos
        }

        // Função para tocar vídeo
        function playVideo(url) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('videoPlayer');

            // Verifica se é URL completa ou ID legado
            if (!url.includes('http')) {
                // Legado (YouTube ID)
                player.src = `https://www.youtube.com/embed/${url}?autoplay=1&rel=0`;
            } else {
                // URL completa (YouTube Embed ou Drive)
                if (url.includes('youtube.com/embed') && !url.includes('autoplay')) {
                    player.src = url + "?autoplay=1&rel=0";
                } else {
                    player.src = url;
                }
            }

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // Função para fechar vídeo
        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('videoPlayer');

            player.src = '';
            modal.style.display = 'none';

            // Restore body scroll
            document.body.style.overflow = 'auto';
        }

        // Fechar modal ao clicar fora
        document.getElementById('videoModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeVideo();
            }
        });

        // Fechar modal com ESC
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closeVideo();
            }
        });


        // Função para obter nome da categoria
        function getCategoryName(category) {
            const names = {
                'pop': 'Pop',
                'rock': 'Rock',
                'eletronica': 'Eletrônica',
                'live': 'Ao Vivo',
                'indie': 'Indie'
            };
            return names[category] || 'Música';
        }


        // Menu mobile toggle
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('active');
        }

        // Fechar menu ao clicar fora
        document.addEventListener('click', function (e) {
            const nav = document.querySelector('.navigation');
            const navLinks = document.getElementById('navLinks');
            if (!nav.contains(e.target)) {
                navLinks.classList.remove('active');
            }
        });

        // Starfield do tema
        const performanceConfig = {
            maxStars: window.innerWidth > 768 ? 150 : 80,
            staticStars: window.innerWidth > 768 ? 40 : 20
        };
        function createStarfield() {
            const starfield = document.getElementById('starfield');
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            starfield.innerHTML = '';
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < performanceConfig.maxStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const angle = Math.random() * 2 * Math.PI;
                const initialRadius = Math.random() * 50 + 10;
                const startX = centerX + Math.cos(angle) * initialRadius;
                const startY = centerY + Math.sin(angle) * initialRadius;
                const directionX = Math.cos(angle);
                const directionY = Math.sin(angle);
                const maxDistance = Math.sqrt(Math.pow(window.innerWidth, 2) + Math.pow(window.innerHeight, 2));
                const travelDistance = maxDistance * (0.7 + Math.random() * 0.5);
                const starType = Math.random();
                if (starType < 0.7) { star.classList.add('distant'); }
                else if (starType < 0.9) { star.classList.add('medium'); }
                else { star.classList.add('close'); }
                const colorType = Math.random();
                if (colorType < 0.1) { star.classList.add('blue'); }
                else if (colorType < 0.2) { star.classList.add('yellow'); }
                star.style.left = startX + 'px';
                star.style.top = startY + 'px';
                star.style.setProperty('--dx', (directionX * travelDistance) + 'px');
                star.style.setProperty('--dy', (directionY * travelDistance) + 'px');
                star.style.animationDelay = Math.random() * 25 + 's';
                fragment.appendChild(star);
            }
            for (let i = 0; i < performanceConfig.staticStars; i++) {
                const staticStar = document.createElement('div');
                staticStar.className = 'star distant';
                staticStar.style.position = 'absolute';
                staticStar.style.left = Math.random() * window.innerWidth + 'px';
                staticStar.style.top = Math.random() * window.innerHeight + 'px';
                staticStar.style.opacity = Math.random() * 0.4 + 0.1;
                staticStar.style.animation = `twinkle ${3 + Math.random() * 4}s ease-in-out infinite alternate`;
                staticStar.style.animationDelay = Math.random() * 2 + 's';
                fragment.appendChild(staticStar);
            }
            starfield.appendChild(fragment);
        }
        // Parallax dos floating elements do tema
        function setupParallax() {
            let ticking = false;
            function updateParallax(e) {
                const floatingElements = document.querySelectorAll('.floating-note');
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                floatingElements.forEach((element, index) => {
                    const speed = (index + 1) * 0.3;
                    const xPos = (x - 0.5) * speed * 15;
                    const yPos = (y - 0.5) * speed * 15;
                    element.style.transform = `translate(${xPos}px, ${yPos}px)`;
                });
                ticking = false;
            }
            document.addEventListener('mousemove', function (e) {
                if (!ticking) {
                    requestAnimationFrame(() => updateParallax(e));
                    ticking = true;
                }
            });
        }
        // Resize otimizado para estrelas
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        window.addEventListener('resize', debounce(() => {
            performanceConfig.maxStars = window.innerWidth > 768 ? 150 : 80;
            performanceConfig.staticStars = window.innerWidth > 768 ? 40 : 20;
            createStarfield();
        }, 250));
        // Criar filtros dinâmicos
        function createFilters() {
            const filtersContainer = document.getElementById('filters');
            filtersContainer.innerHTML = '';

            const categories = ['Todos', ...new Set(videosData.map(v => v.category))];

            categories.forEach(category => {
                const button = document.createElement('button');
                button.className = `filter-tag ${currentFilter === category ? 'active' : ''}`;
                button.innerHTML = `${category}`;
                button.onclick = () => filterVideos(category);
                filtersContainer.appendChild(button);
            });
        }

        // Função para obter ícone da categoria

        // Inicialização do tema
        document.addEventListener('DOMContentLoaded', function () {
            createStarfield();
            setupParallax();
            createFilters();
            fetchVideos();
            updateStats();
        });
    </script>
</body>

</html>
