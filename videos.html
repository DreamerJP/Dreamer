<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vídeos — Dreamer Collection</title>
    <link rel="icon" type="image/x-icon" href="./Assets/Home/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ============================================================
         DESIGN TOKENS
         ============================================================ */
      :root {
        /* Cores base — paleta dark profunda */
        --bg-0: #07070d;          /* fundo absoluto */
        --bg-1: #0c0c14;          /* superfícies elevadas nv1 */
        --bg-2: #14141f;          /* superfícies elevadas nv2 */
        --bg-3: #1c1c2a;          /* hover/active */

        /* Bordas e divisores */
        --border-subtle: rgba(255, 255, 255, 0.06);
        --border-default: rgba(255, 255, 255, 0.10);
        --border-strong: rgba(255, 255, 255, 0.16);

        /* Texto */
        --text-1: #f4f4f7;        /* títulos */
        --text-2: #b9b9c6;        /* corpo */
        --text-3: #6f6f80;        /* meta/legenda */

        /* Acento — usado com parcimônia */
        --accent: #b69cff;        /* roxo holográfico mais suave */
        --accent-soft: rgba(182, 156, 255, 0.14);

        /* Holographic gradient (reservado pro header e 1-2 detalhes) */
        --holo: conic-gradient(
          from 180deg at 50% 50%,
          #ff6db5 0deg,
          #b69cff 90deg,
          #6dd4ff 180deg,
          #84ffd1 270deg,
          #ff6db5 360deg
        );

        /* Tipografia */
        --font-display: "Space Grotesk", system-ui, sans-serif;
        --font-ui: "Inter", system-ui, sans-serif;

        /* Forma */
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 24px;

        /* Sombras */
        --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-2: 0 8px 24px rgba(0, 0, 0, 0.5);
        --shadow-3: 0 24px 60px rgba(0, 0, 0, 0.6);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: var(--font-ui);
        font-feature-settings: "ss01", "cv11";
        background: var(--bg-0);
        color: var(--text-1);
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
      }

      /* ============================================================
         STARFIELD — discreto, só ambientação
         ============================================================ */
      .starfield {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
        opacity: 0.6;
      }

      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0;
        animation: drift linear infinite;
      }
      .star.s1 { width: 1px; height: 1px; animation-duration: 30s; }
      .star.s2 { width: 1.5px; height: 1.5px; animation-duration: 22s; box-shadow: 0 0 3px rgba(255,255,255,.4); }
      .star.s3 { width: 2px; height: 2px; animation-duration: 14s; box-shadow: 0 0 4px rgba(255,255,255,.6); }

      @keyframes drift {
        0%   { opacity: 0; transform: translate(0,0) scale(0.5); }
        20%  { opacity: 0.6; }
        80%  { opacity: 0.6; }
        100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1); }
      }

      /* ============================================================
         NAVEGAÇÃO
         ============================================================ */
      .nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
        background: rgba(7, 7, 13, 0.7);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-bottom: 1px solid var(--border-subtle);
      }

      .nav-inner {
        max-width: 1400px;
        margin: 0 auto;
        padding: 14px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 18px;
        color: var(--text-1);
        text-decoration: none;
        letter-spacing: -0.01em;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-mark {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: var(--holo);
        filter: saturate(1.2);
      }

      .nav-links {
        display: flex;
        gap: 4px;
        list-style: none;
      }

      .nav-links a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        color: var(--text-2);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.15s ease, background 0.15s ease;
      }

      .nav-links a:hover {
        color: var(--text-1);
        background: var(--bg-2);
      }

      .nav-links a.active {
        color: var(--text-1);
        background: var(--bg-3);
      }

      .nav-links a.active::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--holo);
      }

      .menu-toggle {
        display: none;
        background: none;
        border: 1px solid var(--border-default);
        color: var(--text-1);
        width: 36px;
        height: 36px;
        border-radius: 8px;
        cursor: pointer;
        align-items: center;
        justify-content: center;
      }

      /* ============================================================
         HERO / HEADER UNIFICADO
         ============================================================ */
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 88px 28px 80px;
        position: relative;
        z-index: 1;
      }

      .hero {
        position: relative;
        border-radius: var(--radius-xl);
        overflow: hidden;
        margin-top: 24px;
        margin-bottom: 48px;
        min-height: 460px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 48px;
        isolation: isolate;
        border: 1px solid var(--border-subtle);
      }

      /* Imagem de fundo */
      .hero-bg {
        position: absolute;
        inset: 0;
        background-image: url("./Assets/Videos/videos_background.jpg");
        background-size: cover;
        background-position: center;
        z-index: -3;
        transform: scale(1.05);
        filter: saturate(0.9);
      }

      /* Overlay escuro com gradiente — substitui o overlay branco */
      .hero-overlay {
        position: absolute;
        inset: 0;
        z-index: -2;
        background:
          linear-gradient(
            180deg,
            rgba(7, 7, 13, 0.55) 0%,
            rgba(7, 7, 13, 0.75) 60%,
            rgba(7, 7, 13, 0.95) 100%
          );
      }

      /* Anel holográfico fino no topo — único uso forte do gradiente holo */
      .hero::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: var(--holo);
        z-index: 1;
        filter: saturate(1.4);
      }

      /* Glow holográfico sutil atrás do título */
      .hero-glow {
        position: absolute;
        top: -100px;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 400px;
        background: var(--holo);
        filter: blur(120px) saturate(1.2);
        opacity: 0.25;
        z-index: -1;
        pointer-events: none;
      }

      .hero-eyebrow {
        font-family: var(--font-ui);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-3);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .hero-eyebrow::before {
        content: "";
        width: 24px;
        height: 1px;
        background: var(--text-3);
      }

      .hero h1 {
        font-family: var(--font-display);
        font-size: clamp(48px, 7vw, 96px);
        font-weight: 600;
        line-height: 0.95;
        letter-spacing: -0.04em;
        color: var(--text-1);
        margin-bottom: 18px;
      }

      .hero h1 .holo-text {
        background: var(--holo);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: holo-shift 8s ease-in-out infinite;
        filter: saturate(1.3);
      }

      @keyframes holo-shift {
        0%, 100% { background-position: 0% 50%; }
        50%      { background-position: 100% 50%; }
      }

      .hero p {
        font-size: 17px;
        color: var(--text-2);
        max-width: 560px;
        margin-bottom: 36px;
      }

      /* ============================================================
         CONTROLES — filtros + estatísticas (linha única no hero)
         ============================================================ */
      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 24px;
        align-items: end;
      }

      .filters {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .search-wrap {
        position: relative;
        max-width: 380px;
      }

      .search-wrap svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-3);
        width: 16px;
        height: 16px;
      }

      #searchInput {
        width: 100%;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-default);
        border-radius: 10px;
        color: var(--text-1);
        font-family: var(--font-ui);
        font-size: 14px;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      #searchInput::placeholder {
        color: var(--text-3);
      }

      #searchInput:focus {
        outline: none;
        border-color: var(--accent);
        background: rgba(255, 255, 255, 0.08);
      }

      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        padding: 7px 14px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-default);
        color: var(--text-2);
        border-radius: 999px;
        font-family: var(--font-ui);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .chip:hover {
        color: var(--text-1);
        border-color: var(--border-strong);
      }

      .chip.active {
        background: var(--text-1);
        color: var(--bg-0);
        border-color: var(--text-1);
      }

      /* Stats — linha discreta, sem cards */
      .stats {
        display: flex;
        gap: 36px;
        padding: 18px 24px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        backdrop-filter: blur(10px);
      }

      .stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .stat-value {
        font-family: var(--font-display);
        font-size: 28px;
        font-weight: 600;
        line-height: 1;
        color: var(--text-1);
        letter-spacing: -0.02em;
      }

      .stat-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-3);
        font-weight: 500;
      }

      /* ============================================================
         GRID DE VÍDEOS
         ============================================================ */
      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .section-title {
        font-family: var(--font-display);
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .section-meta {
        font-size: 13px;
        color: var(--text-3);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 28px;
      }

      /* Card de vídeo */
      .card {
        position: relative;
        cursor: pointer;
        transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1);
      }

      .card:hover {
        transform: translateY(-2px);
      }

      .thumb {
        position: relative;
        aspect-ratio: 16 / 9;
        border-radius: var(--radius-md);
        overflow: hidden;
        background: var(--bg-2);
        border: 1px solid var(--border-subtle);
        background-size: cover;
        background-position: center;
        margin-bottom: 14px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .card:hover .thumb {
        border-color: var(--border-strong);
        box-shadow: var(--shadow-2);
      }

      /* Gradiente bottom pra integrar */
      .thumb::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          transparent 50%,
          rgba(0, 0, 0, 0.65) 100%
        );
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .card:hover .thumb::after {
        opacity: 1;
      }

      /* Play button — minimal, não gira */
      .play {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.92);
        width: 56px;
        height: 56px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 2;
      }

      .play svg {
        width: 18px;
        height: 18px;
        fill: var(--bg-0);
        margin-left: 3px; /* compensar visual do triângulo */
      }

      .card:hover .play {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      /* Duration / category badges no canto */
      .badge {
        position: absolute;
        bottom: 10px;
        right: 10px;
        padding: 4px 8px;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-1);
        font-size: 11px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        border-radius: 6px;
        z-index: 2;
      }

      .category {
        position: absolute;
        top: 10px;
        left: 10px;
        padding: 4px 10px;
        background: rgba(7, 7, 13, 0.75);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-default);
        color: var(--text-1);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border-radius: 999px;
        z-index: 2;
      }

      /* Info abaixo do thumb */
      .info {
        padding: 0 2px;
      }

      .video-title {
        font-family: var(--font-ui);
        font-size: 15px;
        font-weight: 600;
        color: var(--text-1);
        line-height: 1.35;
        margin-bottom: 4px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .video-artist {
        font-size: 13px;
        color: var(--text-2);
        font-weight: 500;
        margin-bottom: 6px;
      }

      .video-desc {
        font-size: 12px;
        color: var(--text-3);
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Empty state */
      .empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 80px 24px;
        color: var(--text-3);
      }

      .empty-title,
      .error-title {
        font-family: var(--font-display);
        font-size: 20px;
        color: var(--text-2);
        margin-bottom: 8px;
      }

      .error-action {
        margin-top: 18px;
        padding: 10px 18px;
        background: var(--text-1);
        color: var(--bg-0);
        border: none;
        border-radius: 10px;
        font-family: var(--font-ui);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: background 0.15s ease;
      }

      .error-action:hover {
        opacity: 0.9;
      }

      /* ============================================================
         MODAL
         ============================================================ */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.92);
        backdrop-filter: blur(8px);
        z-index: 200;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .modal.open {
        display: flex;
      }

      .modal-content {
        position: relative;
        width: 100%;
        max-width: 1200px;
        aspect-ratio: 16 / 9;
        background: #000;
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-3);
      }

      .modal-close {
        position: absolute;
        top: -44px;
        right: 0;
        width: 32px;
        height: 32px;
        border: 1px solid var(--border-default);
        background: var(--bg-1);
        color: var(--text-1);
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease;
      }

      .modal-close:hover {
        background: var(--bg-3);
      }

      #videoPlayer {
        width: 100%;
        height: 100%;
        border: none;
      }

      /* ============================================================
         RESPONSIVO
         ============================================================ */
      @media (max-width: 768px) {
        .container { padding: 80px 16px 64px; }
        .hero { padding: 32px 24px; min-height: 380px; }
        .controls { grid-template-columns: 1fr; gap: 20px; }
        .stats {
          width: 100%;
          justify-content: space-between;
          gap: 12px;
          padding: 14px 16px;
        }
        .stat-value { font-size: 22px; }
        .nav-links { display: none; }
        .nav-links.open {
          display: flex;
          position: absolute;
          top: 100%;
          left: 0; right: 0;
          flex-direction: column;
          background: rgba(7, 7, 13, 0.95);
          backdrop-filter: blur(20px);
          padding: 16px;
          border-bottom: 1px solid var(--border-subtle);
        }
        .menu-toggle { display: inline-flex; }
        .grid { grid-template-columns: 1fr; gap: 22px; }
        .modal-close { top: 8px; right: 8px; background: rgba(0,0,0,0.6); }
      }

      /* Acessibilidade */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 4px;
      }
    </style>
  </head>

  <body>
    <!-- Starfield -->
    <div class="starfield" id="starfield"></div>

    <!-- Navegação -->
    <nav class="nav">
      <div class="nav-inner">
        <a href="index.html" class="brand">
          <span class="brand-mark"></span>
          Dreamer Collection
        </a>
        <ul class="nav-links" id="navLinks">
          <li><a href="animes.html">Animes</a></li>
          <li><a href="filmes.html">Filmes</a></li>
          <li><a href="jogos.html">Jogos</a></li>
          <li><a href="musicas.html">Músicas</a></li>
          <li><a href="imagens.html">Imagens</a></li>
          <li><a href="videos.html" class="active">Vídeos</a></li>
        </ul>
        <button class="menu-toggle" onclick="toggleMenu()" aria-label="Menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
      </div>
    </nav>

    <!-- Container -->
    <main class="container">
      <!-- Hero -->
      <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-glow"></div>
        <h1>
          Clipes <span class="holo-text">musicais</span><br />
          favoritos.
        </h1>
        <p>
          Minha coleção pessoal de videoclipes.
        </p>

        <div class="controls">
          <div class="filters">
            <div class="chips" id="filters"></div>
            <div class="search-wrap">
              <input
                type="text"
                id="searchInput"
                placeholder="Buscar por título ou artista…"
                oninput="searchVideos()"
              />
            </div>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="stat-value" id="totalVideos">0</div>
              <div class="stat-label">Total</div>
            </div>
            <div class="stat">
              <div class="stat-value" id="currentVideos">0</div>
              <div class="stat-label">Exibindo</div>
            </div>
            <div class="stat">
              <div class="stat-value" id="categoriesCount">0</div>
              <div class="stat-label">Categorias</div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section heading -->
      <div class="section-head">
        <h2 class="section-title">Coleção</h2>
        <span class="section-meta" id="resultMeta">—</span>
      </div>

      <!-- Grid -->
      <div class="grid" id="videosGrid"></div>
    </main>

    <!-- Modal -->
    <div class="modal" id="videoModal" onclick="modalClickOutside(event)">
      <div class="modal-content">
        <button class="modal-close" onclick="closeVideo()" aria-label="Fechar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <iframe id="videoPlayer" allowfullscreen allow="autoplay; fullscreen"></iframe>
      </div>
    </div>

    <script>
      /* ============================================================
         DADOS — carregados de ./Assets/Videos/minha_lista_videos.json
         ============================================================ */
      let videosData = [];
      let currentFilter = "Todos";

      const CATEGORY_NAMES = {
        pop: "Pop",
        rock: "Rock",
        eletronica: "Eletrônica",
        live: "Ao Vivo",
        indie: "Indie",
      };

      /* ============================================================
         FETCH (com fallback) + RENDER
         ============================================================ */
      async function loadVideos() {
        try {
          const res = await fetch("./Assets/Videos/minha_lista_videos.json");
          if (!res.ok) throw new Error("not ok");
          const data = await res.json();
          videosData = data.videos || (Array.isArray(data) ? data : []);
          createFilters();
          render(videosData);
        } catch (err) {
          console.error("Erro ao carregar vídeos:", err);
          videosData = [];
          document.getElementById("videosGrid").innerHTML = `
            <div class="empty">
              <svg class="icon icon-stroke" style="width:36px;height:36px;color:var(--danger, #ff6db5);margin-bottom:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <div class="error-title">Não foi possível carregar a coleção</div>
              <div>Verifique a conexão e tente novamente.</div>
              <button class="error-action" type="button" onclick="loadVideos()">
                <svg class="icon icon-stroke" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Tentar novamente
              </button>
            </div>`;
        }
      }

      function render(videos) {
        const grid = document.getElementById("videosGrid");
        grid.innerHTML = "";

        if (!videos.length) {
          grid.innerHTML = `
            <div class="empty">
              <div class="empty-title">Nada por aqui</div>
              <div>Tente outro filtro ou termo de busca.</div>
            </div>`;
          updateStats(0);
          return;
        }

        videos.forEach((v) => {
          const card = document.createElement("article");
          card.className = "card";
          card.setAttribute("role", "button");
          card.setAttribute("tabindex", "0");
          card.onclick = () => playVideo(v.url);
          card.onkeydown = (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              playVideo(v.url);
            }
          };

          const catName = CATEGORY_NAMES[v.category] || v.category || "—";
          const dur = v.duration ? `<span class="badge">${v.duration}</span>` : "";

          card.innerHTML = `
            <div class="thumb" style="background-image: url('${v.thumbnail}')">
              ${dur}
              <div class="play" aria-hidden="true">
                <svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg>
              </div>
            </div>
            <div class="info">
              <h3 class="video-title">${escapeHtml(v.title)}</h3>
              <div class="video-artist">${escapeHtml(v.artist)}</div>
              ${v.description ? `<p class="video-desc">${escapeHtml(v.description)}</p>` : ""}
            </div>`;
          grid.appendChild(card);
        });

        updateStats(videos.length);
      }

      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        }[c]));
      }

      function createFilters() {
        const cats = ["Todos", ...new Set(videosData.map((v) => v.category).filter(Boolean))];
        const wrap = document.getElementById("filters");
        wrap.innerHTML = "";
        cats.forEach((cat) => {
          const btn = document.createElement("button");
          btn.className = "chip" + (cat === currentFilter ? " active" : "");
          btn.textContent = cat === "Todos" ? "Todos" : (CATEGORY_NAMES[cat] || cat);
          btn.dataset.value = cat;
          btn.onclick = () => filterBy(cat);
          wrap.appendChild(btn);
        });
      }

      function filterBy(category) {
        currentFilter = category;
        document.querySelectorAll(".chip").forEach((c) => {
          c.classList.toggle("active", c.dataset.value === category);
        });
        applyFilters();
      }

      function searchVideos() {
        applyFilters();
      }

      function applyFilters() {
        const q = document.getElementById("searchInput").value.toLowerCase().trim();
        let list = videosData;
        if (currentFilter !== "Todos") {
          list = list.filter((v) => v.category === currentFilter);
        }
        if (q) {
          list = list.filter((v) =>
            (v.title + " " + v.artist + " " + (v.description || ""))
              .toLowerCase()
              .includes(q)
          );
        }
        render(list);
      }

      function updateStats(visible) {
        const total = videosData.length;
        const categories = new Set(videosData.map((v) => v.category).filter(Boolean)).size;
        document.getElementById("totalVideos").textContent = total;
        document.getElementById("currentVideos").textContent = visible;
        document.getElementById("categoriesCount").textContent = categories;
        document.getElementById("resultMeta").textContent =
          visible === total ? `${total} vídeos` : `${visible} de ${total}`;
      }

      /* ============================================================
         MODAL DE VÍDEO
         ============================================================ */
      function playVideo(url) {
        const modal = document.getElementById("videoModal");
        const player = document.getElementById("videoPlayer");
        player.src = normalizeYouTube(url);
        modal.classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function normalizeYouTube(url) {
        if (!url) return "";
        if (!url.includes("http")) return `https://www.youtube.com/embed/${url}?autoplay=1&rel=0`;
        if (url.includes("youtube.com") || url.includes("youtu.be")) {
          let id = "";
          if (url.includes("/embed/")) id = url.split("/embed/")[1].split(/[?&]/)[0];
          else if (url.includes("v=")) id = url.split("v=")[1].split("&")[0];
          else if (url.includes("youtu.be/")) id = url.split("youtu.be/")[1].split(/[?&]/)[0];
          if (id) return `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
        }
        return url;
      }

      function closeVideo() {
        const modal = document.getElementById("videoModal");
        const player = document.getElementById("videoPlayer");
        player.src = "";
        modal.classList.remove("open");
        document.body.style.overflow = "";
      }

      function modalClickOutside(e) {
        if (e.target.id === "videoModal") closeVideo();
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeVideo();
      });

      /* ============================================================
         MENU MOBILE
         ============================================================ */
      function toggleMenu() {
        document.getElementById("navLinks").classList.toggle("open");
      }

      document.addEventListener("click", function (e) {
        const nav = document.querySelector(".nav");
        const navLinks = document.getElementById("navLinks");
        if (navLinks && navLinks.classList.contains("open") && !nav.contains(e.target)) {
          navLinks.classList.remove("open");
        }
      });

      /* ============================================================
         STARFIELD
         ============================================================ */
      function createStarfield() {
        const sf = document.getElementById("starfield");
        const w = window.innerWidth;
        const h = window.innerHeight;
        const cx = w / 2;
        const cy = h / 2;
        const count = w > 768 ? 60 : 30;
        const frag = document.createDocumentFragment();

        for (let i = 0; i < count; i++) {
          const s = document.createElement("div");
          s.className = "star";
          const tier = Math.random();
          if (tier < 0.7) s.classList.add("s1");
          else if (tier < 0.95) s.classList.add("s2");
          else s.classList.add("s3");

          const angle = Math.random() * 2 * Math.PI;
          const r0 = Math.random() * 60 + 20;
          const x0 = cx + Math.cos(angle) * r0;
          const y0 = cy + Math.sin(angle) * r0;
          const dist = Math.sqrt(w * w + h * h) * (0.7 + Math.random() * 0.5);

          s.style.left = x0 + "px";
          s.style.top = y0 + "px";
          s.style.setProperty("--dx", Math.cos(angle) * dist + "px");
          s.style.setProperty("--dy", Math.sin(angle) * dist + "px");
          s.style.animationDelay = -Math.random() * 30 + "s";
          frag.appendChild(s);
        }
        sf.innerHTML = "";
        sf.appendChild(frag);
      }

      /* ============================================================
         INIT
         ============================================================ */
      window.addEventListener("DOMContentLoaded", () => {
        createStarfield();
        loadVideos();
      });

      let resizeTimer;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(createStarfield, 200);
      });
    </script>
  </body>
</html>
