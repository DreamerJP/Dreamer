<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon"
        href="https://raw.githubusercontent.com/DreamerJP/Dreamer/refs/heads/main/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=10">
    <meta name="description" content="Minha seleção especial de músicas - Dreamer Collection">
    <title>Músicas - Dreamer Collection</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --accent-color: #cf6679;
            --text-primary: #e1e1e1;
            --text-secondary: #b3b3b3;
            --bg-main: rgba(18, 18, 35, 0.98);
            --bg-nav: rgba(18, 18, 35, 0.98);
            --shadow-color: rgba(0, 0, 0, 0.4);
            --shadow-color-strong: rgba(0, 0, 0, 0.6);
            --transition-speed: 0.3s;
            --border-radius: 15px;
            --main-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            padding: 20px;
            overflow-y: scroll;
            padding-bottom: 120px;
            /* Space for the fixed player */
        }

        /* Starfield Animation */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
            opacity: 0.8;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: star-travel linear infinite;
        }

        .star.distant {
            width: 1px;
            height: 1px;
            animation-duration: 25s;
            box-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
        }

        .star.medium {
            width: 1.5px;
            height: 1.5px;
            animation-duration: 15s;
            box-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
        }

        .star.close {
            width: 2px;
            height: 2px;
            animation-duration: 8s;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.7);
        }

        .star.blue {
            background: #e6f3ff;
            box-shadow: 0 0 6px rgba(173, 216, 255, 0.6);
        }

        .star.yellow {
            background: #fff8e1;
            box-shadow: 0 0 4px rgba(255, 248, 225, 0.5);
        }

        @keyframes star-travel {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.5);
            }

            10% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
                transform: translate(var(--dx), var(--dy)) scale(1);
            }

            90% {
                opacity: 0.6;
            }

            100% {
                opacity: 0;
                transform: translate(calc(var(--dx) * 2), calc(var(--dy) * 2)) scale(1.2);
            }
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 0.8;
            }
        }

        /* Navigation */
        .navigation {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-nav);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary-color);
            z-index: 1000;
            padding: 15px 0;
            box-shadow: 0 4px 20px var(--shadow-color-strong);
            transition: all var(--transition-speed) ease;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-home {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-home:hover {
            color: var(--primary-color);
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: white;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.8em;
            cursor: pointer;
            color: var(--text-primary);
        }

        /* Main Content */
        .main-content {
            margin-top: 100px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
            position: relative;
            min-height: calc(100vh - 140px);
        }

        /* Unified Header */
        .unified-header {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.4) 0%, rgba(22, 33, 62, 0.4) 50%, rgba(15, 52, 96, 0.4) 100%),
                url('https://raw.githubusercontent.com/DreamerJP/site-images/refs/heads/main/Musicas/musicas_background.jpg') center center/cover no-repeat;
            position: relative;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.10);
            padding: 60px 60px 24px 60px;
            margin-bottom: 40px;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Fallback background if image fails */
        .unified-header[style*="undefined"] {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .unified-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            z-index: 3;
            border-radius: inherit;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .unified-header>* {
            position: relative;
            z-index: 2;
        }

        .header-overlay-fix {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 20px;
            z-index: 1;
            pointer-events: none;
        }

        .unified-header h1 {
            color: #111 !important;
            font-size: 3em;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 20px var(--primary-color), 2px 2px 4px var(--shadow-color);
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .unified-header p {
            color: #111 !important;
            font-size: 1.2em;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 10px var(--primary-color), 1px 1px 2px var(--shadow-color);
        }

        .filters-stats-flex {
            display: flex;
            gap: 40px;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: auto;
            margin-bottom: 0;
        }

        .filters {
            flex: 2;
            min-width: 320px;
            border-radius: 18px !important;
            padding: 10px 10px 8px 10px !important;
            box-shadow: 0 2px 6px var(--shadow-color-strong);
            margin-bottom: 0;
            background: rgba(18, 18, 35, 0.6);
            backdrop-filter: blur(10px);
            min-height: 188px;
        }

        .filter-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 120px;
        }

        .filter-group label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9em;
            text-align: left;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .breadcrumb span:hover {
            color: var(--primary-color);
        }

        .stats-compact {
            flex: 1;
            min-width: 220px;
            background: rgba(18, 18, 35, 0.6);
            border-radius: 18px !important;
            padding: 8px 8px 4px 8px !important;
            box-shadow: 0 2px 6px var(--shadow-color-strong);
            margin-bottom: 0;
            backdrop-filter: blur(10px);
            min-height: 181px;
        }

        .stats-compact .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: rgba(187, 134, 252, 0.1);
            border-radius: 10px;
            box-shadow: 0 2px 8px var(--shadow-color);
            padding: 10px 0 6px 0;
            text-align: center;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.9em;
            color: var(--text-secondary);
        }

        /* Music Grid & Items */
        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .folder-item {
            background: linear-gradient(135deg, rgba(187, 134, 252, 0.1), rgba(3, 218, 198, 0.1));
            border-radius: var(--border-radius);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .folder-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px var(--shadow-color-strong);
            border-color: var(--primary-color);
        }

        .folder-icon {
            font-size: 3rem;
            color: var(--secondary-color);
            margin-bottom: 15px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .folder-name {
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .folder-count {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Track List - Compact & Modern */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-bottom: 100px;
        }

        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .track-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.005);
            /* Subtle scale instead of move */
            padding-left: 20px;
            /* Indent on hover */
        }

        .track-item.active {
            background: linear-gradient(90deg, rgba(187, 134, 252, 0.2), transparent);
            border-left: 3px solid var(--primary-color);
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .track-icon {
            font-size: 1em;
            color: var(--primary-color);
            opacity: 0.8;
        }

        .track-name {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .track-duration {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-right: 15px;
        }

        .play-btn-small {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.5em;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }

        .play-btn-small:hover {
            transform: scale(1.2);
            color: var(--primary-color);
        }

        /* Fixed Audio Player */
        .audio-player-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(18, 18, 35, 0.95);
            backdrop-filter: blur(20px);
            border-top: 2px solid var(--primary-color);
            padding: 15px 30px;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .audio-player-fixed.hidden {
            transform: translateY(100%);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 250px;
        }

        /* Visualizer */
        .visualizer-container {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 25px;
            width: 40px;
        }

        .vis-bar {
            flex: 1;
            background: var(--primary-color);
            min-height: 2px;
            border-radius: 1px;
            transition: height 0.05s ease;
        }

        .now-playing-title {
            color: var(--text-primary);
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 2px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing-artist {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            justify-content: center;
        }

        /* SVG Icon Utilities */
        .control-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
            display: block;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5em;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        .control-btn.active {
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
            /* Glow effect */
            transform: scale(1.1);
        }

        .play-pause-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            color: white;
            font-size: 1.8em;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .play-pause-btn:hover {
            transform: scale(1.1);
            color: white;
            box-shadow: 0 6px 20px rgba(187, 134, 252, 0.6);
        }

        .player-progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 2;
            max-width: 800px;
        }

        .time-display {
            color: var(--text-secondary);
            font-size: 0.85rem;
            min-width: 45px;
            text-align: center;
        }

        .progress-bar-wrapper {
            flex: 1;
            position: relative;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            /* overflow: hidden; Removed to allow tooltip visibility */
        }

        .progress-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            width: 0%;
            border-radius: 3px;
        }

        .play-tooltip {
            position: absolute;
            top: -40px;
            background: rgba(18, 18, 35, 0.95);
            color: #fff;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
            transform: translateX(-50%);
            white-space: nowrap;
            border: 1px solid var(--primary-color);
            z-index: 2005;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            font-weight: bold;
        }

        /* Arrow for tooltip */
        .play-tooltip::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: var(--primary-color) transparent transparent transparent;
        }

        .progress-bar-wrapper:hover .play-tooltip {
            opacity: 1;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 150px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        /* Loading */
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .spin {
            display: inline-block;
            animation: spin 2s infinite linear;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '';
            }

            40% {
                content: '.';
            }

            60% {
                content: '..';
            }

            80%,
            100% {
                content: '...';
            }
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--bg-nav);
                flex-direction: column;
                padding: 20px;
                transform: translateY(-100%);
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
            }

            .nav-links.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }

            .main-content {
                margin-top: 80px;
                padding: 0 10px;
            }

            .unified-header {
                min-height: auto !important;
                padding: 30px 15px 15px 15px !important;
                margin-bottom: 20px;
            }

            .unified-header h1 {
                font-size: 1.8em !important;
                min-height: auto;
                margin-bottom: 5px;
            }

            .unified-header p {
                font-size: 0.9em !important;
                margin-bottom: 15px;
            }

            .filters-stats-flex {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }

            .filters {
                min-height: auto !important;
                padding: 12px !important;
            }

            .stats-compact {
                min-height: auto !important;
                padding: 10px !important;
            }

            .stats-compact h3 {
                font-size: 0.9em !important;
                margin-bottom: 8px !important;
            }

            .stat-card {
                padding: 5px 0;
            }

            .stat-value {
                font-size: 1.1em;
            }

            .stat-label {
                font-size: 0.75em;
            }

            .breadcrumb {
                font-size: 0.85em;
            }


            .audio-player-fixed {
                flex-direction: column;
                padding: 10px 15px;
                gap: 8px;
                /* Stack elements vertically */
            }

            .player-info {
                width: 100%;
                text-align: center;
                margin-bottom: 5px;
                min-width: unset;
                /* Allow shrinking */
            }

            .now-playing-title {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 100%;
                font-size: 0.95rem;
            }

            .player-progress-container {
                width: 100%;
                /* Progress bar below info */
                order: 0;
            }

            .player-controls {
                width: 100%;
                justify-content: center;
                gap: 30px;
                /* More space between buttons */
                order: 1;
            }

            .volume-container {
                display: none;
                /* Hide volume on mobile */
            }

            .folder-grid {
                grid-template-columns: repeat(2, 1fr);
                /* Force 2 columns on mobile */
                gap: 10px;
            }

            .volume-container {
                display: none;
                /* Hide volume on mobile to save space */
            }

            .player-info {
                text-align: center;
                order: -2;
            }
        }

        /* Equalizer Animation in Track List */
        .playing-wave {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2px;
            height: 18px;
            width: 18px;
            margin: 0 auto;
        }

        .wave-bar {
            width: 3px;
            background-color: var(--primary-color);
            border-radius: 2px;
            animation: wave-animation 1s ease-in-out infinite;
        }

        .wave-bar:nth-child(1) {
            animation-duration: 0.6s;
        }

        .wave-bar:nth-child(2) {
            animation-duration: 1.1s;
        }

        .wave-bar:nth-child(3) {
            animation-duration: 0.8s;
        }

        /* Pause animation when paused */
        .track-item.active.paused .wave-bar {
            animation-play-state: paused;
            height: 4px;
            /* Resting state */
        }

        @keyframes wave-animation {

            0%,
            100% {
                height: 3px;
            }

            50% {
                height: 100%;
            }
        }
    </style>
</head>

    <!-- Navigation -->
    <nav class="navigation">
        <div class="nav-container">
            <a href="index.html" class="nav-home">🏠 Home</a>
            <ul class="nav-links" id="navLinks">

            </ul>
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header unified-header">
            <div class="header-overlay-fix"></div>
            <h1>🎵 Galeria Musical</h1>
            <p>MINHA COLEÇÃO DE MÚSICAS</p>

            <div class="filters-stats-flex">
                <div class="filters">
                    <!-- Navigation -->
                    <div class="filter-row" style="margin-bottom: 5px;">
                        <div class="filter-group" style="width: 100%;">
                            <label>📂 Navegação:</label>
                            <div class="breadcrumb" id="breadcrumb"
                                style="display: flex; flex-wrap: wrap; gap: 5px; background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 10px; align-items: center;">
                                <span onclick="navigateToFolder('/')" style="cursor: pointer;">🏠 Início</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stats stats-compact">
                    <h3 style="font-size:1.1em; margin-bottom:10px; text-align:center;">📊 Estatísticas da Coleção</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="displayTotalTracks">-</div>
                            <div class="stat-label">Músicas</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="displayTotalAlbums">-</div>
                            <div class="stat-label">Álbuns</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div id="galleryContent">
            <div class="loading">Carregando biblioteca...</div>
        </div>
    </div>

    <!-- Fixed Audio Player -->
    <div class="audio-player-fixed hidden" id="audioPlayerBar">
        <div class="player-info">
            <div class="visualizer-container" id="visualizer">
                <div class="vis-bar"></div>
                <div class="vis-bar"></div>
                <div class="vis-bar"></div>
                <div class="vis-bar"></div>
            </div>
            <div>
                <div class="now-playing-title" id="playerTitle">Selecione uma música</div>
                <div class="now-playing-artist" id="playerArtist">--</div>
            </div>
        </div>

        <div class="player-controls">
            <button class="control-btn" onclick="toggleShuffle()" id="shuffleBtn" title="Aleatório">
                <svg class="control-icon" viewBox="0 0 24 24">
                    <path
                        d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z" />
                </svg>
            </button>
            <button class="control-btn" onclick="prevTrack()" title="Anterior">
                <svg class="control-icon" viewBox="0 0 24 24">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                </svg>
            </button>
            <button class="control-btn play-pause-btn" onclick="togglePlay()" id="playPauseBtn" title="Play/Pause">
                <svg viewBox="0 0 24 24" fill="currentColor" style="width: 28px; height: 28px; margin-left: 4px;">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </button>
            <button class="control-btn" onclick="nextTrack()" title="Próxima">
                <svg class="control-icon" viewBox="0 0 24 24">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                </svg>
            </button>
            <button class="control-btn" onclick="toggleRepeat()" id="repeatBtn" title="Repetir: Desligado"
                style="opacity: 0.5;">
                <svg class="control-icon" viewBox="0 0 24 24">
                    <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v6z" />
                </svg>
            </button>
        </div>

        <div class="player-progress-container">
            <span class="time-display" id="currentTime">0:00</span>
            <div class="progress-bar-wrapper" id="progressBar" onclick="seek(event)">
                <div class="progress-bar-fill" id="progressFill"></div>
                <div id="playTooltip" class="play-tooltip">0:00</div>
            </div>
            <span class="time-display" id="totalTime">0:00</span>
        </div>

        <div class="volume-container">
            <button class="control-btn" style="font-size: 1.2em;" onclick="toggleMute()" id="muteBtn">🔊</button>
            <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="1"
                oninput="setVolume(this.value)">
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="audioElement" preload="none" crossorigin="anonymous"></audio>

    <script>
        // Stars Animation
        const performanceConfig = {
            maxStars: window.innerWidth > 768 ? 150 : 80,
            staticStars: window.innerWidth > 768 ? 40 : 20
        };

        function createStarfield() {
            const starfield = document.getElementById('starfield');
            starfield.innerHTML = '';
            const fragment = document.createDocumentFragment();
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            for (let i = 0; i < performanceConfig.maxStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const angle = Math.random() * 2 * Math.PI;
                const distance = Math.random() * 200 + 50;
                star.style.left = centerX + 'px';
                star.style.top = centerY + 'px';

                const type = Math.random();
                if (type < 0.6) star.classList.add('distant');
                else if (type < 0.9) star.classList.add('medium');
                else star.classList.add('close');

                const dx = Math.cos(angle) * window.innerWidth;
                const dy = Math.sin(angle) * window.innerHeight;
                star.style.setProperty('--dx', dx + 'px');
                star.style.setProperty('--dy', dy + 'px');
                star.style.animationDelay = Math.random() * 10 + 's';

                fragment.appendChild(star);
            }
            starfield.appendChild(fragment);
        }

        // Logic
        let musicData = {};
        let currentPath = '/';
        let currentQueue = [];
        let currentTrackIndex = -1;
        let isPlaying = false;
        let isShuffle = false;
        let audio = document.getElementById('audioElement');
        let pathMap = { '/': { name: 'Início', type: 'root' } };

        // Visualizer State
        let audioCtx, analyser, dataArray, source;
        const visBars = document.getElementsByClassName('vis-bar');

        function initVisualizer() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 32;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            animateVisualizer();
        }

        function animateVisualizer() {
            requestAnimationFrame(animateVisualizer);
            if (!isPlaying) {
                for (let bar of visBars) bar.style.height = '2px';
                return;
            }
            analyser.getByteFrequencyData(dataArray);
            for (let i = 0; i < visBars.length; i++) {
                const val = dataArray[i * 2] || 0;
                const height = Math.max(2, (val / 255) * 25);
                visBars[i].style.height = height + 'px';
            }
        }

        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }

        async function init() {
            createStarfield();
            try {
                // Load music index (Remote GitHub)
                const response = await fetch('https://raw.githubusercontent.com/DreamerJP/site-images/refs/heads/main/Musicas/music-index.json');
                if (!response.ok) throw new Error('Index not found');
                musicData = await response.json();

                // Calculate stats
                let totalTracks = 0;
                let totalAlbums = 0; // Each folder in root is an Album/Artist

                totalAlbums = Object.keys(musicData).length;
                totalTracks = countTracks(musicData);

                totalAlbums = Object.keys(musicData).length;
                totalTracks = countTracks(musicData);

                document.getElementById('displayTotalTracks').innerText = totalTracks;
                document.getElementById('displayTotalAlbums').innerText = totalAlbums;

                // Start with initial content (no history push)
                loadContent('/', false);
            } catch (e) {
                console.error(e);
                // ... error handling ...
            }
        }

        // Handle Back Button
        window.onpopstate = (event) => {
            if (event.state && event.state.path) {
                loadContent(event.state.path, false);
            } else {
                loadContent('/', false);
            }
        };

        function loadContent(path, pushToHistory = true) {
            currentPath = path;

            if (pushToHistory) {
                history.pushState({ path: path }, '', '#folder=' + path);
            }

            const contentDiv = document.getElementById('galleryContent');
            contentDiv.innerHTML = '';

            // Resolve data from path
            let data = musicData;
            const parts = path.split('/').filter(p => p);

            // Helper to find key efficiently case-insensitive if needed, or direct
            for (let part of parts) {
                // Assuming keys in JSON match path structure
                // We need to map friendly names back to keys if we transformed them, 
                // but here we can just traverse.
                // Simple traversal:
                const key = Object.keys(data).find(k => k.toLowerCase().replace(/\s/g, '-') === part);
                if (key) data = data[key];
            }

            updateBreadcrumb(parts);

            // Render Folders
            const folders = Object.keys(data).filter(k => k !== '_files' && typeof data[k] === 'object');

            if (folders.length > 0) {
                const grid = document.createElement('div');
                grid.className = 'folder-grid';

                folders.forEach(folder => {
                    const item = document.createElement('div');
                    item.className = 'folder-item';
                    const coverUrl = data[folder]._cover;

                    // If cover exists, show image. Else show folder icon.
                    const iconHtml = coverUrl
                        ? `<img src="${coverUrl}" loading="lazy" alt="${folder}" style="width: 100%; height: 120px; object-fit: cover; border-radius: 10px; margin-bottom: 10px;">`
                        : `<div class="folder-icon">📁</div>`;

                    item.innerHTML = `
                        ${iconHtml}
                        <div class="folder-name">${folder}</div>
                        <div class="folder-count">${countTracks(data[folder])} faixas</div>
                    `;
                    item.onclick = () => navigateToFolder(`${path === '/' ? '' : path}/${folder.toLowerCase().replace(/\s/g, '-')}`);
                    grid.appendChild(item);
                });
                contentDiv.appendChild(grid);
            }

            // Render Tracks
            if (data._files && data._files.length > 0) {
                const list = document.createElement('div');
                list.className = 'track-list';

                data._files.forEach((file, index) => {
                    const item = document.createElement('div');
                    item.className = 'track-item';

                    // Extract real name from URL
                    let fileName = 'Faixa ' + (index + 1);
                    try {
                        const rawName = file.split('/').pop();
                        fileName = decodeURIComponent(rawName).replace(/\.(mp3|m4a|wav|flac)$/i, '');
                    } catch (e) { }

                    item.setAttribute('data-url', file);
                    item.innerHTML = `
                <div class="track-info">
                    <span class="track-icon">🎵</span>
                    <div>
                        <div class="track-name">${fileName}</div>
                        <div class="track-duration">${path.split('/').pop().replace(/-/g, ' ')}</div>
                    </div>
                </div>
                <button class="play-btn-small">▶</button>
            `;
                    item.onclick = () => playQueue(data._files, index, path, fileName);
                    list.appendChild(item);
                });

                contentDiv.appendChild(list);
                updateActiveTrackUI();
            }

            if (folders.length === 0 && (!data._files || data._files.length === 0)) {
                contentDiv.innerHTML = '<div class="loading">Pasta vazia</div>';
            }
        }

        function navigateToFolder(path) {
            loadContent(path);
        }

        function updateBreadcrumb(parts) {
            const bc = document.getElementById('breadcrumb');
            let html = '<span onclick="navigateToFolder(\'/\')" style="cursor: pointer;">🏠 Início</span>';

            let buildPath = '';
            parts.forEach(p => {
                buildPath += '/' + p;
                html += ` › <span onclick="navigateToFolder('${buildPath}')" style="cursor: pointer; text-transform: capitalize;">${p.replace(/-/g, ' ')}</span>`;
            });
            bc.innerHTML = html;
        }

        function countTracks(obj) {
            let count = 0;
            if (obj && obj._files) count += obj._files.length;
            if (obj) {
                for (let key in obj) {
                    if (key !== '_files' && typeof obj[key] === 'object') {
                        count += countTracks(obj[key]);
                    }
                }
            }
            return count;
        }


        // --- Player Functions ---

        function playQueue(files, startIndex, folderPath, trackName) {
            // Smart Toggle: If clicking the currently active track, just toggle Play/Pause
            if (currentQueue.length > 0 && currentTrackIndex > -1) {
                const clickedUrl = files[startIndex];
                const currentTrack = currentQueue[currentTrackIndex];

                // Check match. Note: decodeURIComponent might be needed depending on how files are passed, 
                // but usually they match the source exactly.
                if (currentTrack && currentTrack.url === clickedUrl) {
                    togglePlay();
                    return;
                }
            }

            currentQueue = files.map((f, i) => ({
                url: f, // Use URL directly (GitHub/jsDelivr)
                title: trackName && i === startIndex ? trackName : `Faixa ${i + 1}`,
                artist: folderPath.split('/').pop().replace(/-/g, ' ') || 'Artist'
            }));

            // Try to extract better title from filename if possible
            currentQueue.forEach(t => {
                try {
                    const fname = decodeURIComponent(t.url.split('/').pop());
                    // Remove extension
                    const cleanName = fname.replace(/\.(mp3|m4a|wav|flac)$/i, '');
                    // Update title
                    t.title = cleanName;
                } catch (e) { }
            });



            currentTrackIndex = startIndex;
            loadTrack(currentTrackIndex);

            document.getElementById('audioPlayerBar').classList.remove('hidden');
        }

        function loadTrack(index) {
            if (index < 0 || index >= currentQueue.length) return;

            const track = currentQueue[index];
            document.getElementById('playerTitle').innerText = track.title;
            document.getElementById('playerArtist').innerText = track.artist;

            // Media Session API Update
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title,
                    artist: track.artist,
                    artwork: [
                        { src: 'https://raw.githubusercontent.com/DreamerJP/Dreamer/refs/heads/main/favicon.ico', sizes: '96x96', type: 'image/x-icon' },
                        { src: 'https://raw.githubusercontent.com/DreamerJP/Dreamer/refs/heads/main/favicon.ico', sizes: '128x128', type: 'image/x-icon' },
                        // Could use album art if available in track object
                    ]
                });

                // Ensure handlers are set
                navigator.mediaSession.setActionHandler('play', togglePlay);
                navigator.mediaSession.setActionHandler('pause', togglePlay);
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }

            console.log("🎵 Loading track:", track.url);

            // Instant Loading Feedback
            isLoading = true;
            updatePlayButton();

            // Reset player (Standard HTML5)
            audio.pause();
            audio.removeAttribute('src');
            audio.load();

            // Direct assignment - standard HTML5 Audio
            let playUrl = track.url;

            // FIX: jsDelivr has 20MB limit. Bypass for FLAC by using Raw GitHub.
            if (playUrl.includes('.flac') && playUrl.includes('cdn.jsdelivr.net')) {
                // Convert: https://cdn.jsdelivr.net/gh/User/Repo@Branch/Path
                // To:      https://raw.githubusercontent.com/User/Repo/Branch/Path
                playUrl = playUrl.replace('cdn.jsdelivr.net/gh', 'raw.githubusercontent.com')
                    .replace('@', '/');
                console.log("🔄 Bypassing jsDelivr for FLAC:", playUrl);
            }

            audio.src = playUrl;
            audio.preload = "auto";

            // UI Reset
            document.getElementById('totalTime').innerText = '--:--';

            // Init audio context on first user interaction
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            } else {
                initVisualizer();
            }

            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updatePlayButton();
                    updateActiveTrackUI();
                    console.log("✅ Playback Started!");
                }).catch(e => {
                    console.error("❌ Playback failed:", e);
                });
            }
            updateActiveTrackUI();
        }

        function updateActiveTrackUI() {
            const currentTrack = currentQueue[currentTrackIndex];
            let activeItem = null;

            document.querySelectorAll('.track-item').forEach(item => {
                const itemUrl = item.getAttribute('data-url');
                const btn = item.querySelector('.play-btn-small');
                const iconContainer = item.querySelector('.track-icon');

                if (currentTrack && itemUrl === currentTrack.url) {
                    item.classList.add('active');

                    // Animation state based on play/pause
                    if (isPlaying) {
                        item.classList.remove('paused');
                    } else {
                        item.classList.add('paused');
                    }

                    btn.innerHTML = isPlaying ? '⏸' : '▶';

                    // Inject Visualizer if not present
                    if (!iconContainer.querySelector('.playing-wave')) {
                        iconContainer.innerHTML = `
                            <div class="playing-wave">
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                            </div>
                        `;
                    }

                    activeItem = item;
                } else {
                    item.classList.remove('active', 'paused');
                    btn.innerHTML = '▶';
                    // Restore default icon if needed
                    if (iconContainer.innerHTML.indexOf('playing-wave') !== -1) {
                        iconContainer.innerHTML = '🎵';
                    }
                }
            });

            // Auto-scroll to active item
            if (activeItem) {
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function togglePlay() {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (audio.paused) {
                audio.play();
                isPlaying = true;
            } else {
                audio.pause();
                isPlaying = false;
            }
            updatePlayButton();
        }

        // State Logic
        let isLoading = false;

        function updatePlayButton() {
            const btn = document.getElementById('playPauseBtn');

            if (isLoading) {
                // Loading/Buffering
                btn.innerHTML = '<span class="spin" style="font-size: 24px;">⏳</span>';
                btn.style.paddingLeft = '0';
            } else if (isPlaying) {
                // Pause Icon (SVG) - Perfect Center
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" style="width: 24px; height: 24px;"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>';
                btn.style.paddingLeft = '0'; // Reset optical adjustment
            } else {
                // Play Icon (SVG) - Perfect Center
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" style="width: 28px; height: 28px; margin-left: 4px;"><path d="M8 5v14l11-7z"/></svg>';
                btn.style.paddingLeft = '0';
            }
        }

        let repeatMode = 0; // 0: Off, 1: All, 2: One

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            const btn = document.getElementById('repeatBtn');

            if (repeatMode === 0) { // Off
                btn.style.color = 'var(--text-primary)';
                btn.style.opacity = '0.5';
                btn.innerHTML = `<svg class="control-icon" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v6z"/></svg>`;
                btn.setAttribute('title', 'Repetir: Desligado');
            } else if (repeatMode === 1) { // All
                btn.style.color = 'var(--primary-color)';
                btn.style.opacity = '1';
                btn.innerHTML = `<svg class="control-icon" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v6z"/></svg>`;
                btn.setAttribute('title', 'Repetir: Tudo');
            } else { // One
                btn.style.color = 'var(--primary-color)';
                btn.style.opacity = '1';
                // Icon with small 1
                btn.innerHTML = `<svg class="control-icon" viewBox="0 0 24 24">
                    <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v6z"/>
                    <text x="12" y="16" font-size="10" font-weight="bold" fill="currentColor" text-anchor="middle">1</text>
                </svg>`;
                btn.setAttribute('title', 'Repetir: Uma');
            }
        }

        function nextTrack() {
            if (isShuffle) {
                let next = Math.floor(Math.random() * currentQueue.length);
                loadTrack(next);
                currentTrackIndex = next;
            } else {
                if (currentTrackIndex < currentQueue.length - 1) {
                    currentTrackIndex++;
                    loadTrack(currentTrackIndex);
                } else if (repeatMode === 1) {
                    // Repeat All Loop
                    currentTrackIndex = 0;
                    loadTrack(currentTrackIndex);
                }
            }
        }

        // ... prevTrack stays same ...

        audio.onended = () => {
            if (repeatMode === 2) {
                // Repeat One
                audio.currentTime = 0;
                audio.play();
            } else {
                nextTrack();
            }
        };

        function seek(e) {
            if (audio.duration && isFinite(audio.duration)) {
                const bar = document.getElementById('progressBar');
                const pct = e.offsetX / bar.offsetWidth;
                audio.currentTime = pct * audio.duration;
            }
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' + sec : sec}`;
        }

        function setVolume(val) {
            audio.volume = val;
            const btn = document.getElementById('muteBtn');
            if (val == 0) {
                btn.innerHTML = '🔇';
            } else {
                btn.innerHTML = '🔊';
                // If user moves slider, ensuring we unmute if it was muted
                if (audio.muted) audio.muted = false;
            }
        }

        function toggleMute() {
            audio.muted = !audio.muted;
            const btn = document.getElementById('muteBtn');
            btn.innerHTML = audio.muted ? '🔇' : '🔊';
        }

        // Initialize

        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            // Ignore if typing in an input (future proofing)
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            switch (e.code) {
                case 'Space':
                    e.preventDefault(); // Prevent scrolling
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    if (audio.duration) {
                        audio.currentTime = Math.max(0, audio.currentTime - 5);
                        updatePlayButton(); // Optional: Visual feedback if needed
                    }
                    break;
                case 'ArrowRight':
                    if (audio.duration) {
                        audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
                    }
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    setVolume(Math.min(1, audio.volume + 0.1));
                    document.querySelector('.volume-slider').value = audio.volume;
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    setVolume(Math.max(0, audio.volume - 0.1));
                    document.querySelector('.volume-slider').value = audio.volume;
                    break;
                case 'KeyM':
                    toggleMute();
                    break;
            }
        });

        // Tooltip Logic
        const pBar = document.getElementById('progressBar');
        const pTooltip = document.getElementById('playTooltip');

        pBar.addEventListener('mousemove', (e) => {
            const rect = pBar.getBoundingClientRect();
            const offsetX = e.clientX - rect.left;
            const width = rect.width;

            // Calculate time
            let duration = audio.duration || 0;
            // If nothing loaded yet, default to 0 or maybe a placeholder if desired.
            if (!isFinite(duration)) duration = 0;

            const pct = Math.max(0, Math.min(1, offsetX / width));
            const time = pct * duration;

            // Update Position & Text
            pTooltip.style.left = offsetX + 'px';
            pTooltip.innerText = formatTime(time);
        });

        window.onload = init;
    </script>
</body>
